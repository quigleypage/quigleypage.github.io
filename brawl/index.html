// CAMERA
// ============================================================
const Camera = (() => {
  let cx = 640, cy = 380, zoom = 1;
  let zoomPunchAmount = 0;
  const MIN_ZOOM = 0.7, MAX_ZOOM = 1.3;
  const EASE = 0.08;
  
  function reset() {
    cx = 640; cy = 380; zoom = 1; zoomPunchAmount = 0;
  }
  
  function update(p1, p2) {
    const midX = (p1.x + p2.x) / 2;
    const midY = (p1.y + p2.y) / 2;
    
    const dx = Math.abs(p1.x - p2.x);
    const dy = Math.abs(p1.y - p2.y);
    
    // Zoom to keep both players visible with padding
    const padX = 280, padY = 220;
    const neededW = dx + padX * 2;
    const neededH = dy + padY * 2;
    const zoomForW = GAME_W / neededW;
    const zoomForH = GAME_H / neededH;
    const targetZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, Math.min(zoomForW, zoomForH)));
    
    // Target center — bias slightly upward to keep stage visible
    const targetCX = midX;
    const targetCY = midY - 20;
    
    cx += (targetCX - cx) * EASE;
    cy += (targetCY - cy) * EASE;
    zoom += (targetZoom + zoomPunchAmount - zoom) * EASE;
    
    // Decay zoom punch
    zoomPunchAmount *= 0.75;
    if (Math.abs(zoomPunchAmount) < 0.002) zoomPunchAmount = 0;
  }
  
  function apply(ctx) {
    ctx.scale(zoom, zoom);
    ctx.translate(-cx, -cy);
  }
  
  function zoomPunch(amount) {
    zoomPunchAmount += amount;
  }
  
  return { reset, update, apply, zoomPunch };
})();

const StageRenderer = (() => {
  const wobble = (x, y) => ({ x: x + (Math.sin(x * 0.01 + y * 0.02) * 2), y: y + (Math.cos(x * 0.02 + y * 0.01) * 1.5) });
  
  function seededRand(seed) {
    let s = seed;
    return () => { s = (s * 16807 + 0) % 2147483647; return (s - 1) / 2147483646; };
  }
  
  // ---- BACKGROUNDS (screen-space — plain paper only, NO geometric patterns) ----
  function drawBackground(ctx, stage, w, h) {
    const theme = stage.theme || 'default';
    
    if (theme === 'lined') {
      // Base paper color only — patterns are in world-space
      ctx.fillStyle = '#F5F0E0';
      ctx.fillRect(0, 0, w, h);
      const rng = seededRand(42);
      ctx.strokeStyle = 'rgba(180,165,130,0.08)'; ctx.lineWidth = 1;
      for (let i = 0; i < 20; i++) {
        const x1 = rng() * w, y1 = rng() * h;
        ctx.beginPath(); ctx.moveTo(x1, y1);
        ctx.quadraticCurveTo(x1+(rng()-0.5)*100, y1+(rng()-0.5)*60, x1+(rng()-0.5)*150, y1+(rng()-0.5)*100);
        ctx.stroke();
      }

    } else if (theme === 'grid') {
      // Base paper color only — grid is in world-space
      ctx.fillStyle = '#F5F5EE';
      ctx.fillRect(0, 0, w, h);

    } else if (theme === 'watercolor') {
      ctx.fillStyle = '#FAF6EE';
      ctx.fillRect(0, 0, w, h);
      // Canvas weave (abstract, no parallax issue)
      ctx.strokeStyle = 'rgba(200,190,170,0.07)'; ctx.lineWidth = 0.5;
      for (let x = 0; x < w; x += 5) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
      for (let y = 0; y < h; y += 5) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
      // Abstract washes
      const washes = [
        {x:150,y:120,r:200,c:[200,120,120]}, {x:w-200,y:150,r:220,c:[100,150,200]},
        {x:w/2,y:h-200,r:260,c:[120,190,140]}, {x:300,y:h-100,r:180,c:[200,180,100]},
        {x:w-150,y:h/2,r:190,c:[160,120,200]}
      ];
      for (const wash of washes) {
        const grad = ctx.createRadialGradient(wash.x,wash.y,0,wash.x,wash.y,wash.r);
        const [r,g,b] = wash.c;
        grad.addColorStop(0, `rgba(${r},${g},${b},0.10)`);
        grad.addColorStop(0.7, `rgba(${r},${g},${b},0.03)`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);
      }
      const rng = seededRand(77);
      const sc = ['rgba(200,80,80,0.12)','rgba(60,120,200,0.12)','rgba(80,180,100,0.10)','rgba(200,160,40,0.10)','rgba(160,80,200,0.09)'];
      for (let i = 0; i < 15; i++) {
        ctx.fillStyle = sc[Math.floor(rng()*sc.length)];
        const sx = rng()*w, sy = rng()*h;
        ctx.beginPath(); ctx.arc(sx,sy,3+rng()*10,0,Math.PI*2); ctx.fill();
        for (let j = 0; j < 3; j++) { ctx.beginPath(); ctx.arc(sx+(rng()-0.5)*30,sy+(rng()-0.5)*30,1+rng()*3,0,Math.PI*2); ctx.fill(); }
      }
    } else if (theme === 'sheet') {
      // Clean white manuscript paper
      ctx.fillStyle = '#FAFAFA';
      ctx.fillRect(0, 0, w, h);
      // Very subtle warm tint
      ctx.fillStyle = 'rgba(245,238,225,0.12)';
      ctx.fillRect(0, 0, w, h);
    } else {
      ctx.fillStyle = PARCHMENT;
      ctx.fillRect(0, 0, w, h);
    }
  }

  // ---- Helper: hand-drawn wavy line ----
  function wavyLine(ctx, x1, y1, x2, y2, amp) {
    ctx.beginPath(); ctx.moveTo(x1, y1);
    const len = Math.hypot(x2-x1, y2-y1);
    const steps = Math.max(8, Math.floor(len / 6));
    for (let i = 1; i <= steps; i++) {
      const t = i / steps;
      ctx.lineTo(x1+(x2-x1)*t, y1+(y2-y1)*t + Math.sin(t*12+x1*0.1)*amp);
    }
    ctx.stroke();
  }

  // ---- Helper: thick brush stroke shape ----
  function brushStroke(ctx, x, y, w, h, color, strokeColor) {
    ctx.save();
    ctx.fillStyle = color; ctx.strokeStyle = strokeColor; ctx.lineWidth = 2;
    ctx.beginPath();
    const pL=6, pR=8, pT=5, pB=4;
    ctx.moveTo(x-pL, y+h*0.4);
    ctx.bezierCurveTo(x+w*0.15,y-pT-3, x+w*0.35,y-pT+2, x+w*0.5,y-pT);
    ctx.bezierCurveTo(x+w*0.65,y-pT-2, x+w*0.85,y-pT+1, x+w+pR,y+h*0.3);
    ctx.bezierCurveTo(x+w+pR-2,y+h+pB-2, x+w+pR*0.3,y+h+pB+2, x+w*0.7,y+h+pB);
    ctx.bezierCurveTo(x+w*0.5,y+h+pB+1, x+w*0.3,y+h+pB-1, x+w*0.15,y+h+pB);
    ctx.bezierCurveTo(x-pL+2,y+h+pB+1, x-pL,y+h*0.7, x-pL,y+h*0.4);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Bristle lines
    ctx.strokeStyle = strokeColor; ctx.lineWidth = 0.6; ctx.globalAlpha = 0.25;
    for (let bx = x+5; bx < x+w-5; bx += 6) {
      const yOff = Math.sin(bx*0.08)*2;
      ctx.beginPath(); ctx.moveTo(bx,y+2+yOff); ctx.lineTo(bx+3,y+h-2+yOff); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    // Highlight streak
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x+10,y+3); ctx.quadraticCurveTo(x+w*0.5,y+1,x+w-15,y+4); ctx.stroke();
    ctx.restore();
  }

  // ---- PLATFORM RENDERING ----
  function drawPlatformShape(ctx, plat, theme, isMain, idx) {
    if (theme === 'lined') {
      // Underline stroke
      ctx.strokeStyle = isMain ? '#3A3020' : '#4A4030';
      ctx.lineWidth = isMain ? 3.5 : 2.5;
      wavyLine(ctx, plat.x-4, plat.y+plat.h/2, plat.x+plat.w+4, plat.y+plat.h/2, isMain?1.5:1);
      if (isMain) { ctx.fillStyle = 'rgba(80,70,50,0.06)'; ctx.fillRect(plat.x,plat.y,plat.w,plat.h); }

    } else if (theme === 'grid') {
      ctx.fillStyle = isMain ? '#E0DCD0' : 'rgba(60,70,100,0.12)';
      ctx.strokeStyle = '#2A2A40';
      ctx.lineWidth = isMain ? 2.5 : 2.5;
      const tl=wobble(plat.x,plat.y), tr=wobble(plat.x+plat.w,plat.y);
      const br=wobble(plat.x+plat.w,plat.y+plat.h), bl=wobble(plat.x,plat.y+plat.h);
      ctx.beginPath(); ctx.moveTo(tl.x,tl.y); ctx.lineTo(tr.x,tr.y); ctx.lineTo(br.x,br.y); ctx.lineTo(bl.x,bl.y); ctx.closePath();
      ctx.fill(); ctx.stroke();
      if (isMain) {
        ctx.strokeStyle = 'rgba(60,60,80,0.12)'; ctx.lineWidth = 0.8;
        for (let hx=plat.x; hx<plat.x+plat.w; hx+=8) { ctx.beginPath(); ctx.moveTo(hx,plat.y); ctx.lineTo(hx+plat.h,plat.y+plat.h); ctx.stroke(); }
      }

    } else if (theme === 'watercolor') {
      const brushColors = [
        {fill:'rgba(210,75,75,0.65)', stroke:'rgba(160,50,50,0.7)'},
        {fill:'rgba(65,130,210,0.60)', stroke:'rgba(40,90,170,0.7)'},
        {fill:'rgba(80,185,110,0.55)', stroke:'rgba(50,140,75,0.6)'},
        {fill:'rgba(210,175,50,0.55)', stroke:'rgba(170,135,20,0.6)'},
        {fill:'rgba(165,90,210,0.50)', stroke:'rgba(120,60,170,0.6)'}
      ];
      if (isMain) {
        brushStroke(ctx, plat.x,plat.y,plat.w,plat.h, 'rgba(160,145,120,0.7)','rgba(110,95,70,0.5)');
      } else {
        const bc = brushColors[idx % brushColors.length];
        brushStroke(ctx, plat.x,plat.y,plat.w,plat.h, bc.fill, bc.stroke);
      }

    } else if (theme === 'sheet') {
      // Platforms ARE staff lines — dark, crisp, straight
      ctx.strokeStyle = 'rgba(40,32,20,0.85)';
      ctx.lineWidth = isMain ? 2.5 : 2;
      ctx.beginPath();
      ctx.moveTo(plat.x, plat.y + plat.h/2);
      ctx.lineTo(plat.x + plat.w, plat.y + plat.h/2);
      ctx.stroke();

    } else {
      // Default: hand-drawn ink
      ctx.fillStyle = isMain ? STAGE_COLOR : PLAT_COLOR;
      ctx.strokeStyle = INK; ctx.lineWidth = isMain ? 3 : 2.5;
      const tl=wobble(plat.x,plat.y), tr=wobble(plat.x+plat.w,plat.y);
      const br=wobble(plat.x+plat.w,plat.y+plat.h), bl=wobble(plat.x,plat.y+plat.h);
      ctx.beginPath(); ctx.moveTo(tl.x,tl.y); ctx.lineTo(tr.x,tr.y); ctx.lineTo(br.x,br.y); ctx.lineTo(bl.x,bl.y); ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.lineWidth = isMain ? 1 : 0.8;
      ctx.strokeStyle = 'rgba(59,47,30,'+(isMain?'0.3':'0.2')+')';
      const hLen = isMain ? 20 : 10;
      for (let hx=plat.x; hx<plat.x+plat.w; hx+=(isMain?12:10)) {
        ctx.beginPath(); ctx.moveTo(hx,plat.y+plat.h); ctx.lineTo(hx+hLen*0.4,plat.y+plat.h+hLen); ctx.stroke();
      }
    }
  }

  // ---- Helper: draw hand-drawn + sign ----
  function drawPlusSign(ctx, ps) {
    // ps = { cx, cy, hW, hH, vW, vH }
    ctx.save();
    ctx.fillStyle = 'rgba(50,55,90,0.10)';
    ctx.strokeStyle = '#2A2A40';
    ctx.lineWidth = 2.5;
    
    // Build + shape as a single path
    const l = ps.cx - ps.hW, r = ps.cx + ps.hW;
    const t = ps.cy - ps.vH, b = ps.cy + ps.vH;
    const vl = ps.cx - ps.vW, vr = ps.cx + ps.vW;
    const ht = ps.cy - ps.hH, hb = ps.cy + ps.hH;
    
    // Clockwise from top-left of vertical bar, with slight wobble
    const pts = [
      [vl, t], [vr, t],       // top of vertical
      [vr, ht], [r, ht],      // right turn into horizontal
      [r, hb], [vr, hb],      // bottom of right horizontal
      [vr, b], [vl, b],       // bottom of vertical
      [vl, hb], [l, hb],      // left turn into horizontal
      [l, ht], [vl, ht]       // top of left horizontal
    ];
    
    ctx.beginPath();
    pts.forEach(([x, y], i) => {
      const wx = x + Math.sin(x * 0.02 + y * 0.01) * 2;
      const wy = y + Math.cos(x * 0.01 + y * 0.02) * 1.5;
      i === 0 ? ctx.moveTo(wx, wy) : ctx.lineTo(wx, wy);
    });
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    
    // Light cross-hatch inside
    ctx.strokeStyle = 'rgba(50,55,90,0.06)';
    ctx.lineWidth = 0.8;
    ctx.save();
    ctx.clip(); // clip to the + shape
    for (let hx = l; hx < r; hx += 10) {
      ctx.beginPath(); ctx.moveTo(hx, t); ctx.lineTo(hx + 40, b); ctx.stroke();
    }
    ctx.restore();
    
    ctx.restore();
  }

  // ---- WORLD-SPACE DECORATIONS ----
  function drawDecorations(ctx, stage) {
    const theme = stage.theme || 'default';
    const mp = stage.mainPlatform;

    if (theme === 'default') {
      ctx.save();
      if (stage.id === 'skyline') {
        ctx.strokeStyle = 'rgba(59,47,30,0.12)'; ctx.fillStyle = 'rgba(59,47,30,0.04)'; ctx.lineWidth = 1.5;
        const baseY = mp.y - 5;
        const buildings = [[-60,40,120],[-15,55,180],[45,35,100],[85,60,220],[150,30,90],[185,50,160],[240,45,130],[290,35,70],[330,60,200],[395,40,110],[440,55,170],[500,30,85],[535,65,240],[605,40,100],[650,50,150],[705,35,90],[745,45,130],[795,60,190],[860,30,80]];
        for (const [bx,bw,bh] of buildings) {
          const x = mp.x+bx; ctx.beginPath(); ctx.rect(x,baseY-bh,bw,bh); ctx.fill(); ctx.stroke();
          for (let wy=baseY-bh+15; wy<baseY-10; wy+=18) for (let wx=x+8; wx<x+bw-5; wx+=12) { ctx.fillStyle='rgba(59,47,30,0.08)'; ctx.fillRect(wx,wy,5,6); }
          ctx.fillStyle = 'rgba(59,47,30,0.04)';
        }
        ctx.strokeStyle='rgba(59,47,30,0.1)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(mp.x+567,mp.y-245); ctx.lineTo(mp.x+567,mp.y-290); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(mp.x+567,mp.y-290); ctx.lineTo(mp.x+580,mp.y-284); ctx.lineTo(mp.x+567,mp.y-278); ctx.stroke();
        ctx.fillStyle='rgba(59,47,30,0.04)'; ctx.strokeStyle='rgba(59,47,30,0.08)'; ctx.lineWidth=1;
        const drawCloud=(cx,cy,s)=>{ctx.beginPath();ctx.arc(cx,cy,15*s,0,Math.PI*2);ctx.arc(cx+18*s,cy-5*s,12*s,0,Math.PI*2);ctx.arc(cx+30*s,cy,14*s,0,Math.PI*2);ctx.arc(cx+14*s,cy+5*s,10*s,0,Math.PI*2);ctx.fill();ctx.stroke();};
        drawCloud(mp.x+100,180,1); drawCloud(mp.x+500,150,1.2); drawCloud(mp.x+750,200,0.9);
      } else if (stage.id === 'theslab') {
        ctx.strokeStyle='rgba(59,47,30,0.1)'; ctx.lineWidth=1.5;
        const c1=mp.x+20,c1y=mp.y-200; for(let i=0;i<8;i++){ctx.beginPath();ctx.moveTo(c1+i*8,c1y);ctx.lineTo(c1,c1y+i*8);ctx.stroke();}
        const c2=mp.x+mp.w-20,c2y=mp.y-200; for(let i=0;i<8;i++){ctx.beginPath();ctx.moveTo(c2-i*8,c2y);ctx.lineTo(c2,c2y+i*8);ctx.stroke();}
        ctx.fillStyle='rgba(59,47,30,0.06)'; const rng2=seededRand(99);
        for(let i=0;i<20;i++){const sx=mp.x+rng2()*mp.w,sy=mp.y-250+rng2()*200;ctx.beginPath();ctx.arc(sx,sy,1.5+rng2()*3,0,Math.PI*2);ctx.fill();}
        ctx.font='14px monospace';ctx.fillStyle='rgba(59,47,30,0.06)';ctx.textAlign='center';
        ctx.fillText('FINAL DESTINATION',mp.x+mp.w/2,mp.y-180);ctx.textAlign='left';
      }
      ctx.restore();

    } else if (theme === 'lined') {
      ctx.save();

      // Ruled lines & margin in world-space, oversized to fill any camera view
      ctx.strokeStyle = 'rgba(100,140,200,0.28)'; ctx.lineWidth = 1;
      ctx.beginPath();
      for (let y = -1000; y < 3000; y += 28) { ctx.moveTo(-1000,y); ctx.lineTo(3000,y); }
      ctx.stroke();
      ctx.strokeStyle = 'rgba(200,80,80,0.30)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(mp.x - 50, -1000); ctx.lineTo(mp.x - 50, 3000); ctx.stroke();

      // Words above each platform (the underlines)
      stage.platforms.forEach((p) => {
        const isTitle = p.label && p.label.startsWith('Chapter');
        ctx.font = isTitle ? 'bold 20px cursive' : '18px cursive';
        ctx.fillStyle = isTitle ? 'rgba(50,40,60,0.55)' : 'rgba(50,40,60,0.45)';
        ctx.textAlign = 'center';
        ctx.fillText(p.label || '', p.x + p.w / 2, p.y - 8);
        ctx.textAlign = 'left';
      });

      // Sentence on main platform
      ctx.font = '24px cursive'; ctx.fillStyle = 'rgba(50,40,60,0.50)'; ctx.textAlign = 'center';
      ctx.fillText('the end.', mp.x + mp.w / 2, mp.y - 8);
      ctx.textAlign = 'left';

      // Teacher's red circle around the chapter title
      const titlePlat = stage.platforms[0];
      if (titlePlat) {
        ctx.strokeStyle = 'rgba(200,60,60,0.30)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.ellipse(titlePlat.x + titlePlat.w/2, titlePlat.y - 12, titlePlat.w/2 + 15, 22, -0.03, 0, Math.PI * 2); ctx.stroke();
      }

      // Teacher's red check mark on margin note
      const marginPlat = stage.platforms[2];
      if (marginPlat) {
        ctx.strokeStyle = 'rgba(200,60,60,0.35)'; ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(marginPlat.x + marginPlat.w + 15, marginPlat.y - 18);
        ctx.lineTo(marginPlat.x + marginPlat.w + 22, marginPlat.y - 5);
        ctx.lineTo(marginPlat.x + marginPlat.w + 38, marginPlat.y - 28);
        ctx.stroke();
      }

      // "A+" grade in left margin area
      ctx.font = 'bold 28px cursive'; ctx.fillStyle = 'rgba(200,60,60,0.30)';
      ctx.fillText('A+', mp.x - 42, 280);
      ctx.strokeStyle = 'rgba(200,60,60,0.20)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.ellipse(mp.x - 26, 272, 30, 22, 0, 0, Math.PI * 2); ctx.stroke();

      // Margin doodles
      ctx.strokeStyle = 'rgba(60,60,100,0.18)'; ctx.lineWidth = 1.5;
      // Spiral
      ctx.beginPath();
      for (let a = 0; a < Math.PI * 6; a += 0.15) {
        const r = 2 + a * 1.6, sx = mp.x + mp.w + 65 + Math.cos(a) * r, sy = 380 + Math.sin(a) * r;
        a === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
      }
      ctx.stroke();
      // Star
      const stX = mp.x + mp.w + 55, stY = 290;
      for (let i = 0; i < 5; i++) {
        const a = (i/5)*Math.PI*2-Math.PI/2, na = ((i+2)%5/5)*Math.PI*2-Math.PI/2;
        ctx.beginPath(); ctx.moveTo(stX+Math.cos(a)*18,stY+Math.sin(a)*18); ctx.lineTo(stX+Math.cos(na)*18,stY+Math.sin(na)*18); ctx.stroke();
      }
      // Coffee ring
      ctx.strokeStyle = 'rgba(140,100,60,0.10)'; ctx.lineWidth = 3.5;
      ctx.beginPath(); ctx.arc(mp.x + mp.w - 40, 250, 32, 0, Math.PI * 2); ctx.stroke();

      ctx.restore();

    } else if (theme === 'grid') {
      ctx.save();

      // Graph paper grid in world-space, oversized to fill any camera view
      const gs = 36;
      // Fine grid (batched into single path)
      ctx.strokeStyle = 'rgba(120,160,200,0.16)'; ctx.lineWidth = 0.5;
      ctx.beginPath();
      for (let x = -1000; x < 3000; x += gs/2) { ctx.moveTo(x,-1000); ctx.lineTo(x,3000); }
      for (let y = -1000; y < 3000; y += gs/2) { ctx.moveTo(-1000,y); ctx.lineTo(3000,y); }
      ctx.stroke();
      // Bold grid (batched)
      ctx.strokeStyle = 'rgba(100,140,190,0.30)'; ctx.lineWidth = 1;
      ctx.beginPath();
      for (let x = -1000; x < 3000; x += gs) { ctx.moveTo(x,-1000); ctx.lineTo(x,3000); }
      for (let y = -1000; y < 3000; y += gs) { ctx.moveTo(-1000,y); ctx.lineTo(3000,y); }
      ctx.stroke();

      // Draw the decorative + sign (NOT a platform)
      if (stage.plusSign) {
        drawPlusSign(ctx, stage.plusSign);
      }

      // Big equation: "3 + 2 = 5"
      const crossbar = stage.platforms[0];
      const plusCy = stage.plusSign ? stage.plusSign.cy : 375;
      ctx.font = 'bold 80px monospace'; ctx.fillStyle = 'rgba(50,50,80,0.25)'; ctx.textAlign = 'center';
      ctx.fillText('3', crossbar.x - 45, plusCy + 28);
      ctx.fillText('2', crossbar.x + crossbar.w + 55, plusCy + 28);
      ctx.textAlign = 'left';
      // "= 5"
      const eqX = crossbar.x + crossbar.w + 110;
      ctx.strokeStyle = 'rgba(50,50,80,0.22)'; ctx.lineWidth = 4.5;
      wavyLine(ctx, eqX, plusCy - 10, eqX + 60, plusCy - 10, 1.5);
      wavyLine(ctx, eqX, plusCy + 14, eqX + 60, plusCy + 14, 1.5);
      ctx.font = 'bold 80px monospace'; ctx.fillStyle = 'rgba(50,50,80,0.25)'; ctx.textAlign = 'center';
      ctx.fillText('5', eqX + 100, plusCy + 28);
      ctx.textAlign = 'left';

      // Margin equations (subtle)
      ctx.font = '16px monospace'; ctx.fillStyle = 'rgba(60,60,80,0.14)';
      ctx.save(); ctx.translate(mp.x + 15, 215); ctx.rotate(-0.02); ctx.fillText('a\u00B2 + b\u00B2 = c\u00B2', 0, 0); ctx.restore();
      ctx.save(); ctx.translate(mp.x + mp.w - 110, mp.y - 15); ctx.rotate(0.01); ctx.fillText('\u0394y/\u0394x', 0, 0); ctx.restore();

      // Coordinate axes
      ctx.strokeStyle = 'rgba(60,60,80,0.16)'; ctx.lineWidth = 1.5;
      const axX = mp.x - 25, axY = mp.y - 25;
      ctx.beginPath(); ctx.moveTo(axX, axY); ctx.lineTo(axX, axY - 70); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(axX, axY); ctx.lineTo(axX + 70, axY); ctx.stroke();
      // Arrows
      ctx.beginPath(); ctx.moveTo(axX, axY-70); ctx.lineTo(axX-4, axY-60); ctx.moveTo(axX, axY-70); ctx.lineTo(axX+4, axY-60); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(axX+70, axY); ctx.lineTo(axX+60, axY-4); ctx.moveTo(axX+70, axY); ctx.lineTo(axX+60, axY+4); ctx.stroke();
      ctx.font = '12px monospace'; ctx.fillStyle = 'rgba(60,60,80,0.16)';
      ctx.fillText('y', axX-12, axY-55); ctx.fillText('x', axX+62, axY+14);

      // Small parabola in corner
      ctx.strokeStyle = 'rgba(60,60,80,0.12)'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let t = -15; t <= 15; t++) { const gx = mp.x+mp.w+50+t*2, gy = 280+(t*t)*0.08; t === -15 ? ctx.moveTo(gx,gy) : ctx.lineTo(gx,gy); }
      ctx.stroke();
      ctx.font = '10px monospace'; ctx.fillStyle = 'rgba(60,60,80,0.12)';
      ctx.fillText('f(x)=x\u00B2', mp.x+mp.w+30, 270);

      ctx.restore();

    } else if (theme === 'watercolor') {
      ctx.save();
      // Glow halos around colored platforms
      stage.platforms.forEach((p, i) => {
        const colors = [[200,80,80],[60,120,200],[80,180,110],[200,170,50],[160,90,200]];
        const [r,g,b] = colors[i % colors.length];
        const grad = ctx.createRadialGradient(p.x+p.w/2, p.y+p.h/2, 10, p.x+p.w/2, p.y+p.h/2, 100);
        grad.addColorStop(0, `rgba(${r},${g},${b},0.10)`);
        grad.addColorStop(0.6, `rgba(${r},${g},${b},0.03)`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad; ctx.fillRect(p.x-100, p.y-100, p.w+200, 200);
      });
      // Paint drips off platforms
      ctx.lineWidth = 2.5;
      stage.platforms.forEach((p, i) => {
        const dc = ['rgba(210,75,75,0.25)','rgba(65,130,210,0.25)','rgba(80,185,110,0.20)','rgba(210,175,50,0.22)'];
        ctx.strokeStyle = dc[i % dc.length];
        const rng = seededRand(i * 31 + 7);
        for (let d = 0; d < 2; d++) {
          const dx = p.x+15+rng()*(p.w-30), dy = p.y+p.h, dLen = 20+rng()*35;
          ctx.beginPath(); ctx.moveTo(dx, dy);
          ctx.quadraticCurveTo(dx+(rng()-0.5)*8, dy+dLen*0.6, dx+(rng()-0.5)*4, dy+dLen); ctx.stroke();
          ctx.fillStyle = ctx.strokeStyle; ctx.beginPath(); ctx.arc(dx+(rng()-0.5)*4, dy+dLen+3, 3, 0, Math.PI*2); ctx.fill();
        }
      });
      // Paint palette near main platform
      const palX = mp.x + 50, palY = mp.y - 35;
      ctx.strokeStyle = 'rgba(100,80,60,0.18)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.ellipse(palX, palY, 50, 30, -0.2, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(palX-18, palY+7, 9, 6, 0, 0, Math.PI*2); ctx.stroke();
      const dollops = [{dx:12,dy:-12,c:'rgba(220,60,60,0.25)'},{dx:28,dy:-3,c:'rgba(50,120,200,0.25)'},{dx:22,dy:10,c:'rgba(60,180,80,0.22)'},{dx:3,dy:15,c:'rgba(220,200,40,0.25)'},{dx:-8,dy:-10,c:'rgba(180,80,220,0.22)'}];
      for (const d of dollops) { ctx.fillStyle = d.c; ctx.beginPath(); ctx.arc(palX+d.dx, palY+d.dy, 5, 0, Math.PI*2); ctx.fill(); }
      // Paintbrush
      ctx.save(); ctx.translate(mp.x+mp.w-40, mp.y-50); ctx.rotate(0.4);
      ctx.fillStyle = 'rgba(180,140,60,0.18)'; ctx.strokeStyle = 'rgba(100,80,50,0.18)'; ctx.lineWidth = 1.5;
      ctx.fillRect(-3,0,6,50); ctx.strokeRect(-3,0,6,50);
      ctx.fillStyle = 'rgba(180,180,170,0.2)'; ctx.fillRect(-4,-4,8,7);
      ctx.fillStyle = 'rgba(80,60,40,0.18)'; ctx.beginPath(); ctx.moveTo(-5,-4); ctx.quadraticCurveTo(-6,-16,0,-20); ctx.quadraticCurveTo(6,-16,5,-4); ctx.closePath(); ctx.fill();
      ctx.fillStyle = 'rgba(60,120,200,0.2)'; ctx.beginPath(); ctx.arc(0,-16,4,0,Math.PI*2); ctx.fill();
      ctx.restore();
      // Italic text
      ctx.font = 'italic 18px cursive'; ctx.fillStyle = 'rgba(100,80,60,0.10)';
      ctx.save(); ctx.translate(mp.x+mp.w/2-70, mp.y-55); ctx.rotate(-0.03);
      ctx.fillText('~ create something beautiful ~', 0, 0); ctx.restore();
      ctx.restore();

    } else if (theme === 'sheet') {
      ctx.save();

      // ---- TILED STAFF LINES across entire world ----
      const staffSpacing = 30;
      const systemH = 180;
      ctx.strokeStyle = 'rgba(60,50,40,0.35)'; ctx.lineWidth = 0.8;
      ctx.beginPath();
      for (let groupY = -1000; groupY < 3000; groupY += systemH) {
        for (let line = 0; line < 5; line++) {
          const ly = groupY + line * staffSpacing;
          ctx.moveTo(-1000, ly); ctx.lineTo(3000, ly);
        }
      }
      ctx.stroke();

      // ---- CLEF (Unicode treble clef) ----
      function drawClef(cx, lines, alpha) {
        ctx.save();
        ctx.fillStyle = 'rgba(50,40,30,' + alpha + ')';
        ctx.font = '90px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('𝄞', cx, (lines[1] + lines[3]) / 2 + 8);
        ctx.restore();
      }

      // ---- NOTE HELPERS ----
      function drawNote(nx, ny, stemUp, filled, alpha) {
        ctx.save();
        const a = alpha || 0.30;
        ctx.fillStyle = filled ? 'rgba(50,40,30,' + a + ')' : 'rgba(50,40,30,' + (a*0.4) + ')';
        ctx.strokeStyle = 'rgba(50,40,30,' + a + ')'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.ellipse(nx, ny, 7, 5, -0.3, 0, Math.PI*2);
        if (filled) ctx.fill(); ctx.stroke();
        const stemDir = stemUp ? -1 : 1;
        ctx.beginPath(); ctx.moveTo(nx + (stemUp ? 6 : -6), ny);
        ctx.lineTo(nx + (stemUp ? 6 : -6), ny + stemDir * 35); ctx.stroke();
        ctx.restore();
        return nx + (stemUp ? 6 : -6);
      }

      function drawFlag(sx, sy, stemUp, alpha) {
        ctx.save();
        const a = alpha || 0.30;
        ctx.strokeStyle = 'rgba(50,40,30,' + a + ')'; ctx.lineWidth = 1.5;
        const dir = stemUp ? -1 : 1;
        ctx.beginPath();
        ctx.moveTo(sx, sy + dir * 35);
        ctx.bezierCurveTo(sx+10, sy + dir*25, sx+12, sy + dir*18, sx+4, sy + dir*12);
        ctx.stroke();
        ctx.restore();
      }

      // ---- DECORATE EVERY STAFF uniformly ----
      const decoRng = seededRand(77);
      for (let groupY = -1000; groupY < 3000; groupY += systemH) {
        const gLines = [0,1,2,3,4].map(i => groupY + i * staffSpacing);
        const alpha = 0.25;

        // Clef
        drawClef(mp.x + 42, gLines, alpha);

        // Time signature
        ctx.font = 'bold 30px serif'; ctx.fillStyle = 'rgba(50,40,30,' + alpha + ')';
        ctx.textAlign = 'center';
        ctx.fillText('4', mp.x + 90, gLines[1] + 8);
        ctx.fillText('4', mp.x + 90, gLines[3] + 8);
        ctx.textAlign = 'left';

        // Bar lines
        ctx.strokeStyle = 'rgba(50,40,30,' + (alpha * 0.8) + ')'; ctx.lineWidth = 1;
        const bxs = [mp.x - 5, mp.x + mp.w/3, mp.x + 2*mp.w/3, mp.x + mp.w + 5];
        for (const bx of bxs) {
          ctx.beginPath(); ctx.moveTo(bx, gLines[0]); ctx.lineTo(bx, gLines[4]); ctx.stroke();
        }
        // Double bar at end
        ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.moveTo(bxs[3]+4, gLines[0]); ctx.lineTo(bxs[3]+4, gLines[4]); ctx.stroke();

        // Scattered notes (5-8 per staff)
        const nNotes = 5 + Math.floor(decoRng() * 4);
        for (let ni = 0; ni < nNotes; ni++) {
          const nx = mp.x + 110 + decoRng() * (mp.w - 140);
          const lineIdx = Math.floor(decoRng() * 5);
          const onLine = decoRng() > 0.45;
          const ny = gLines[lineIdx] + (onLine ? 0 : staffSpacing * 0.5);
          const stemUp = ny > gLines[2];
          const filled = decoRng() > 0.25;
          const sx = drawNote(nx, ny, stemUp, filled, alpha);
          if (decoRng() > 0.7) drawFlag(sx, ny, stemUp, alpha);
        }

        // Dynamic marking
        const dynamics = ['pp', 'p', 'mp', 'mf', 'f', 'ff'];
        const dynText = dynamics[Math.floor(decoRng() * dynamics.length)];
        const dynX = mp.x + 130 + decoRng() * (mp.w - 200);
        ctx.font = 'italic 20px serif'; ctx.fillStyle = 'rgba(50,40,30,' + (alpha * 0.9) + ')';
        ctx.fillText(dynText, dynX, gLines[4] + 28);

        // Occasional crescendo hairpin
        if (decoRng() > 0.6) {
          const hpX = mp.x + 200 + decoRng() * (mp.w - 350);
          const hpY = gLines[4] + 30;
          ctx.strokeStyle = 'rgba(50,40,30,' + (alpha * 0.7) + ')'; ctx.lineWidth = 1.2;
          ctx.beginPath(); ctx.moveTo(hpX, hpY); ctx.lineTo(hpX+60, hpY-5); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(hpX, hpY); ctx.lineTo(hpX+60, hpY+5); ctx.stroke();
        }
      }

      ctx.restore();
    }
  }

  // ---- MAIN DRAW ----
  function draw(ctx, stage) {
    const theme = stage.theme || 'default';
    drawDecorations(ctx, stage);
    drawPlatformShape(ctx, stage.mainPlatform, theme, true, -1);
    stage.platforms.forEach((p, i) => drawPlatformShape(ctx, p, theme, false, i));
    ctx.fillStyle = theme === 'watercolor' ? 'rgba(100,80,60,0.6)' : INK;
    for (const l of stage.ledges) { ctx.beginPath(); ctx.arc(l.x, l.y, 5, 0, Math.PI*2); ctx.fill(); }
  }

  function drawPreview(canvas, stg) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    drawBackground(ctx, stg, w, h);
    ctx.save();
    const mp = stg.mainPlatform;
    const stageCX = mp.x + mp.w / 2, stageCY = mp.y - 100;
    const stageViewW = mp.w + 280, stageViewH = 400;
    const scale = Math.min(w / stageViewW, h / stageViewH) * 0.85;
    ctx.translate(w/2, h/2); ctx.scale(scale, scale); ctx.translate(-stageCX, -stageCY);
    draw(ctx, stg);
    ctx.restore();
  }

  return { draw, drawPreview, drawBackground };
})();

// ============================================================
// INPUT SYSTEM
// ============================================================
const Input = (() => {
  const keys = {};
  const state = { lx: 0, ly: 0, a: false, b: false, jump: false, shield: false, grab: false };
  const prevState = { ...state };
  let touchJoystick = null;
  const touchButtons = { a: false, b: false, jump: false, shield: false, grab: false };
  let isMobile = false;
  let gamepadIndex = -1;
  
  function init() {
    isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      keys[e.key.toLowerCase()] = true; e.preventDefault();
    });
    document.addEventListener('keyup', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      keys[e.key.toLowerCase()] = false;
    });
    
    // Gamepad connection events (required by Chrome before getGamepads works)
    window.addEventListener('gamepadconnected', e => {
      gamepadIndex = e.gamepad.index;
      console.log('Gamepad connected:', e.gamepad.id, 'index:', e.gamepad.index,
        'buttons:', e.gamepad.buttons.length, 'axes:', e.gamepad.axes.length);
    });
    window.addEventListener('gamepaddisconnected', e => {
      console.log('Gamepad disconnected:', e.gamepad.id);
      if (e.gamepad.index === gamepadIndex) gamepadIndex = -1;
    });
    
    if (isMobile) setupTouchControls();
  }
  
  function setupTouchControls() {
    const tc = document.getElementById('touchControls');
    tc.innerHTML = '';
    
    // Joystick zone
    const joyZone = document.createElement('div');
    joyZone.style.cssText = 'position:absolute;left:0;top:0;width:50%;height:100%;';
    
    let joyOrigin = null, joyBase = null, joyThumb = null;
    
    joyZone.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.changedTouches[0];
      const rect = tc.getBoundingClientRect();
      joyOrigin = { x: t.clientX - rect.left, y: t.clientY - rect.top };
      if (!joyBase) {
        joyBase = document.createElement('div');
        joyBase.style.cssText = `position:absolute;width:100px;height:100px;border-radius:50%;border:2px solid rgba(59,47,30,0.3);background:rgba(237,224,204,0.2);pointer-events:none;transform:translate(-50%,-50%);`;
        tc.appendChild(joyBase);
        joyThumb = document.createElement('div');
        joyThumb.style.cssText = `position:absolute;width:40px;height:40px;border-radius:50%;background:rgba(59,47,30,0.35);pointer-events:none;transform:translate(-50%,-50%);`;
        tc.appendChild(joyThumb);
      }
      joyBase.style.left = joyOrigin.x + 'px';
      joyBase.style.top = joyOrigin.y + 'px';
      joyBase.style.display = 'block';
      joyThumb.style.left = joyOrigin.x + 'px';
      joyThumb.style.top = joyOrigin.y + 'px';
      joyThumb.style.display = 'block';
    });
    
    joyZone.addEventListener('touchmove', e => {
      e.preventDefault();
      if (!joyOrigin) return;
      const t = e.changedTouches[0];
      const rect = tc.getBoundingClientRect();
      const dx = t.clientX - rect.left - joyOrigin.x;
      const dy = t.clientY - rect.top - joyOrigin.y;
      const maxR = 50;
      const dist = Math.min(Math.sqrt(dx*dx + dy*dy), maxR);
      const angle = Math.atan2(dy, dx);
      const nx = Math.cos(angle) * dist;
      const ny = Math.sin(angle) * dist;
      touchJoystick = { x: nx / maxR, y: ny / maxR };
      if (joyThumb) {
        joyThumb.style.left = (joyOrigin.x + nx) + 'px';
        joyThumb.style.top = (joyOrigin.y + ny) + 'px';
      }
    });
    
    const endJoy = () => {
      joyOrigin = null;
      touchJoystick = null;
      if (joyBase) joyBase.style.display = 'none';
      if (joyThumb) joyThumb.style.display = 'none';
    };
    joyZone.addEventListener('touchend', endJoy);
    joyZone.addEventListener('touchcancel', endJoy);
    
    tc.appendChild(joyZone);
    
    // Action buttons — diamond layout + trigger
    //          [SH]        ← trigger above diamond
    //          [JMP]       ← top
    //     [GRB]     [A]   ← left / right
    //          [B]         ← bottom
    const btnDefs = [
      // Diamond face buttons
      { id: 'a',      label: 'A',   size: 60, right: 4,   bottom: 48 },   // right of diamond
      { id: 'b',      label: 'B',   size: 56, right: 56,  bottom: 2 },    // bottom of diamond
      { id: 'grab',   label: 'GRB', size: 52, right: 108, bottom: 52 },   // left of diamond
      { id: 'jump',   label: 'JMP', size: 56, right: 56,  bottom: 100 },  // top of diamond
      // Trigger — offset right above A, separated from JMP
      { id: 'shield', label: 'SH',  size: 46, right: 9,   bottom: 165 }
    ];
    
    for (const bd of btnDefs) {
      const btn = document.createElement('div');
      btn.className = 'touch-btn';
      btn.style.width = bd.size + 'px';
      btn.style.height = bd.size + 'px';
      btn.style.right = bd.right + 'px';
      btn.style.bottom = bd.bottom + 'px';
      btn.style.fontSize = (bd.size * 0.35) + 'px';
      btn.textContent = bd.label;
      
      btn.addEventListener('touchstart', e => {
        e.preventDefault();
        touchButtons[bd.id] = true;
        btn.classList.add('pressed');
      });
      btn.addEventListener('touchend', e => {
        e.preventDefault();
        touchButtons[bd.id] = false;
        btn.classList.remove('pressed');
      });
      btn.addEventListener('touchcancel', () => {
        touchButtons[bd.id] = false;
        btn.classList.remove('pressed');
      });
      
      tc.appendChild(btn);
    }
  }
  
  function poll() {
    Object.assign(prevState, state);
    
    // Keyboard
    let kx = 0, ky = 0;
    if (keys['a'] || keys['arrowleft']) kx -= 1;
    if (keys['d'] || keys['arrowright']) kx += 1;
    if (keys['w'] || keys['arrowup'] || keys[' ']) ky -= 1;
    if (keys['s'] || keys['arrowdown']) ky += 1;
    
    state.lx = kx;
    state.ly = ky;
    state.a = !!(keys['j'] || keys['z']);
    state.b = !!(keys['k'] || keys['x']);
    state.jump = !!(keys['w'] || keys['arrowup'] || keys[' ']);
    state.shield = !!(keys[';'] || keys['v']);
    state.grab = !!(keys['l'] || keys['c']);
    
    // Gamepad
    const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
    let gp = gamepadIndex >= 0 ? gamepads[gamepadIndex] : null;
    // Fallback: scan for any connected gamepad
    if (!gp) {
      for (let gi = 0; gi < gamepads.length; gi++) {
        if (gamepads[gi]) { gp = gamepads[gi]; gamepadIndex = gi; break; }
      }
    }
    if (gp) {
      // Left stick (with deadzone)
      const deadzone = 0.25;
      const gpx = Math.abs(gp.axes[0]) > deadzone ? gp.axes[0] : 0;
      const gpy = Math.abs(gp.axes[1]) > deadzone ? gp.axes[1] : 0;
      if (gpx || gpy) { state.lx = gpx; state.ly = gpy; }
      // D-pad (buttons 12-15: up, down, left, right)
      if (gp.buttons[14] && gp.buttons[14].pressed) state.lx = -1;
      if (gp.buttons[15] && gp.buttons[15].pressed) state.lx = 1;
      if (gp.buttons[12] && gp.buttons[12].pressed) state.ly = -1;
      if (gp.buttons[13] && gp.buttons[13].pressed) state.ly = 1;
      // Face buttons (Nintendo layout): B(0)=special, A(1)=attack, X(2)=grab, Y(3)=jump
      if (gp.buttons[0] && gp.buttons[0].pressed) state.b = true;
      if (gp.buttons[1] && gp.buttons[1].pressed) state.a = true;
      if (gp.buttons[2] && gp.buttons[2].pressed) state.grab = true;
      if (gp.buttons[3] && gp.buttons[3].pressed) state.jump = true;
      // Shoulders: L1(4)/R1(5)=grab, L2(6)/R2(7)=shield
      if (gp.buttons[4] && gp.buttons[4].pressed) state.grab = true;
      if (gp.buttons[5] && gp.buttons[5].pressed) state.grab = true;
      if (gp.buttons[6] && (gp.buttons[6].pressed || gp.buttons[6].value > 0.3)) state.shield = true;
      if (gp.buttons[7] && (gp.buttons[7].pressed || gp.buttons[7].value > 0.3)) state.shield = true;
    }
    
    // Overlay touch
    if (touchJoystick) {
      state.lx = touchJoystick.x;
      state.ly = touchJoystick.y;
    }
    if (touchButtons.a) state.a = true;
    if (touchButtons.b) state.b = true;
    if (touchButtons.jump) state.jump = true;
    if (touchButtons.shield) state.shield = true;
    if (touchButtons.grab) state.grab = true;
  }
  
  function justPressed(btn) { return state[btn] && !prevState[btn]; }
  function getState() { return state; }
  function isMobileDevice() { return isMobile; }
  
  return { init, poll, justPressed, getState, isMobileDevice };
})();

// ============================================================
// NETWORK STUB (PeerJS multiplayer)
// ============================================================
const Network = (() => {
  let peer = null, conn = null, isHost = false, roomCode = '', connected = false;
  let onMessage = null;
  let onClose = null;
  let remoteInputBuffer = {};  // frame -> input
  
  function createRoom() {
    roomCode = genCode();
    document.getElementById('lobbyCreate').style.display = 'none';
    document.getElementById('lobbyWaiting').style.display = 'block';
    document.getElementById('roomCodeDisplay').textContent = roomCode;
    document.getElementById('lobbyStatus').textContent = 'Loading PeerJS...';
    isHost = true;
    
    loadPeerJS(() => {
      peer = new Peer('paperbrawl-' + roomCode);
      peer.on('open', () => {
        document.getElementById('lobbyStatus').textContent = 'Waiting for opponent...';
      });
      peer.on('connection', c => {
        conn = c;
        setupConn();
      });
      peer.on('error', e => {
        document.getElementById('lobbyStatus').textContent = 'Error: ' + e.type;
      });
    });
  }
  
  function joinRoom() {
    roomCode = document.getElementById('joinCodeInput').value.toUpperCase();
    if (roomCode.length !== 4) return;
    document.getElementById('lobbyCreate').style.display = 'none';
    document.getElementById('lobbyWaiting').style.display = 'block';
    document.getElementById('roomCodeDisplay').textContent = roomCode;
    document.getElementById('lobbyStatus').textContent = 'Connecting...';
    isHost = false;
    
    loadPeerJS(() => {
      peer = new Peer();
      peer.on('open', () => {
        conn = peer.connect('paperbrawl-' + roomCode);
        setupConn();
      });
      peer.on('error', e => {
        document.getElementById('lobbyStatus').textContent = 'Error: ' + e.type;
      });
    });
  }
  
  function setupConn() {
    conn.on('open', () => {
      connected = true;
      document.getElementById('lobbyStatus').textContent = 'Connected!';
      setTimeout(() => Game.onNetworkConnected(), 500);
    });
    conn.on('data', data => {
      if (data.type === 'frame_input') {
        remoteInputBuffer[data.frame] = data.input;
      } else if (onMessage) {
        onMessage(data);
      }
    });
    conn.on('close', () => {
      const wasConnected = connected;
      connected = false;
      document.getElementById('lobbyStatus').textContent = 'Disconnected';
      if (wasConnected && onClose) onClose();
    });
  }
  
  function send(data) { if (conn && connected) conn.send(data); }
  
  function sendFrameInput(frame, input) {
    send({ type: 'frame_input', frame, input });
  }
  
  function hasInputForFrame(frame) {
    return frame in remoteInputBuffer;
  }
  
  function getInputForFrame(frame) {
    const inp = remoteInputBuffer[frame];
    delete remoteInputBuffer[frame];
    return inp || { lx: 0, ly: 0, a: false, b: false, jump: false, shield: false, grab: false };
  }
  
  function clearInputBuffer() {
    remoteInputBuffer = {};
  }
  
  function disconnect() {
    connected = false;  // set before close so onClose callback doesn't fire
    if (conn) conn.close();
    if (peer) peer.destroy();
    peer = null; conn = null;
    remoteInputBuffer = {};
    document.getElementById('lobbyCreate').style.display = 'block';
    document.getElementById('lobbyWaiting').style.display = 'none';
  }
  
  function genCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    for (let i = 0; i < 4; i++) code += chars[Math.floor(Math.random() * chars.length)];
    return code;
  }
  
  function loadPeerJS(cb) {
    if (window.Peer) { cb(); return; }
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/peerjs/dist/peerjs.min.js';
    s.onload = cb;
    s.onerror = () => {
      document.getElementById('lobbyStatus').textContent = 'Failed to load PeerJS';
    };
    document.head.appendChild(s);
  }
  
  function setOnMessage(fn) { onMessage = fn; }
  function setOnClose(fn) { onClose = fn; }
  function isConnected() { return connected; }
  function getIsHost() { return isHost; }
  
  return { createRoom, joinRoom, send, sendFrameInput, hasInputForFrame,
    getInputForFrame, clearInputBuffer, isConnected, getIsHost, disconnect, setOnMessage, setOnClose };
})();

// ============================================================
// GAME ENGINE
// ============================================================
const Game = (() => {
  let canvas, ctx;
  let gameState = 'title'; // title, charSelect, stageSelect, match, results
  let mode = 'single'; // single, multi
  let selectedChars = [0, 0];
  let selectedStage = 0;
  let players = [];
  let stage = null;
  let matchFrame = 0;
  let countdownTimer = 0;
  let countdownPhase = 0;
  let matchActive = false;
  let winner = -1;
  let koSlowmoTimer = 0;
  let lastTime = 0;
  let accumulator = 0;
  
  // Multiplayer state
  let myCharConfirmed = false, remoteCharConfirmed = false;
  let remoteCharId = 0;
  let myCharId = 0;  // local player's character pick (survives remote overwrites)
  
  // Lockstep state
  const NET_INPUT_DELAY = 3;
  const CHECKSUM_INTERVAL = 30;
  let syncFrame = 0;
  let localInputBuffer = {};
  let multiCountdown = 0;  // frame-based countdown for multiplayer
  let pendingSyncChecks = {};  // frame -> { hash, state? }
  
  function init() {
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    Input.init();
    resize();
    window.addEventListener('resize', resize);
    
    // Pause music/audio when tab loses focus, resume when it returns
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        Music.pause();
        Audio.suspend();
      } else {
        Music.resume();
        Audio.resume();
      }
    });
    
    Network.setOnMessage(handleNetMessage);
    Network.setOnClose(() => {
      if (gameState === 'match' || gameState === 'results' || gameState === 'charSelect' || gameState === 'stageSelect') {
        onDisconnect();
      }
    });
    
    buildCharSelectUI();
    buildStageSelectUI();
    
    requestAnimationFrame(gameLoop);
  }
  
  function resize() {
    canvas.width = window.innerWidth * devicePixelRatio;
    canvas.height = window.innerHeight * devicePixelRatio;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }
  
  function gameLoop(time) {
    requestAnimationFrame(gameLoop);
    
    if (!lastTime) { lastTime = time; return; }
    const delta = Math.min(time - lastTime, 50);
    lastTime = time;
    accumulator += delta;
    
    Input.poll();
    
    while (accumulator >= FRAME_TIME) {
      accumulator -= FRAME_TIME;
      if (gameState === 'match' && matchActive) {
        if (mode === 'multi') {
          // ---- LOCKSTEP MULTIPLAYER ----
          // Copy current input for the frame we're sending ahead
          const inp = Input.getState();
          const sendFrame = syncFrame + NET_INPUT_DELAY;
          if (!localInputBuffer[sendFrame]) {
            localInputBuffer[sendFrame] = {
              lx: inp.lx, ly: inp.ly, a: inp.a, b: inp.b,
              jump: inp.jump, shield: inp.shield, grab: inp.grab
            };
            Network.sendFrameInput(sendFrame, localInputBuffer[sendFrame]);
          }
          
          // Can we simulate this frame?
          if (localInputBuffer[syncFrame] && Network.hasInputForFrame(syncFrame)) {
            const localInp = localInputBuffer[syncFrame];
            const remoteInp = Network.getInputForFrame(syncFrame);
            delete localInputBuffer[syncFrame];
            
            // Countdown phase: consume inputs but don't simulate gameplay
            if (multiCountdown > 0) {
              multiCountdown--;
              const sec = Math.ceil(multiCountdown / 60);
              const overlay = document.getElementById('matchStartOverlay');
              const text = document.getElementById('matchStartText');
              if (multiCountdown > 0 && sec >= 1 && sec <= 3) {
                text.textContent = '' + sec;
              } else if (multiCountdown === 0) {
                text.textContent = 'GO!';
                setTimeout(() => overlay.classList.remove('active'), 500);
              }
              syncFrame++;
              continue;
            }
            
            const p1Input = Network.getIsHost() ? localInp : remoteInp;
            const p2Input = Network.getIsHost() ? remoteInp : localInp;
            
            // KO slow-mo: skip simulation but still advance frame
            let skipSim = false;
            if (koSlowmoTimer > 0) {
              koSlowmoTimer--;
              if (koSlowmoTimer % 2 === 0) skipSim = true;
            }
            
            if (!skipSim) {
              updateMatch(p1Input, p2Input);
            }
            
            // Periodic checksum — host sends hash + state snapshot
            if (syncFrame > 0 && syncFrame % CHECKSUM_INTERVAL === 0) {
              const hash = computeChecksum();
              if (Network.getIsHost()) {
                Network.send({ type: 'sync_check', frame: syncFrame, hash, state: serializeGameState() });
              } else {
                Network.send({ type: 'sync_check', frame: syncFrame, hash });
              }
            }
            
            // Process any buffered sync checks up to this frame
            const checkFrames = Object.keys(pendingSyncChecks).map(Number).filter(f => f <= syncFrame);
            for (const cf of checkFrames) {
              const remote = pendingSyncChecks[cf];
              delete pendingSyncChecks[cf];
              // Only compare if we're at the exact frame (skip stale ones)
              if (cf === syncFrame) {
                const localHash = computeChecksum();
                if (localHash !== remote.hash) {
                  console.warn('DESYNC at frame ' + syncFrame +
                    ': local=' + localHash + ' remote=' + remote.hash);
                  if (remote.state && !Network.getIsHost()) {
                    deserializeGameState(remote.state);
                  } else if (Network.getIsHost() && !remote.state) {
                    Network.send({ type: 'state_sync', frame: syncFrame, state: serializeGameState() });
                  }
                }
              }
            }
            
            syncFrame++;
          } else {
            // Waiting for remote input — give back time and stop
            accumulator += FRAME_TIME;
            break;
          }
        } else {
          // ---- SINGLE PLAYER ----
          if (koSlowmoTimer > 0) {
            koSlowmoTimer--;
            if (koSlowmoTimer % 2 === 0) continue; // half speed
          }
          updateMatch();
        }
      }
    }
    
    render();
  }
  
  // ---- SCREEN MANAGEMENT ----
  function showScreen(id) {
    // Fade out all current screens
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    // Fade in the new screen (CSS transition handles the animation)
    if (id) {
      const el = document.getElementById(id);
      if (el) el.classList.add('active');
    }
    
    document.getElementById('hud').classList.remove('visible');
    document.getElementById('touchControls').style.display = 'none';
    document.getElementById('muteBtn').style.display = 'none';
    document.getElementById('matchStartOverlay').classList.remove('active');
    document.getElementById('matchEndOverlay').classList.remove('active');
  }
  
  function startSinglePlayer() {
    Audio.menuConfirm();
    Music.play('menu');
    mode = 'single';
    gameState = 'charSelect';
    myCharConfirmed = false;
    showScreen('charSelectScreen');
    document.getElementById('charSelectStatus').textContent = '';
  }
  
  function showMultiplayer() {
    Audio.menuConfirm();
    Music.play('menu');
    mode = 'multi';
    showScreen('lobbyScreen');
  }
  
  function onNetworkConnected() {
    gameState = 'charSelect';
    myCharConfirmed = false;
    remoteCharConfirmed = false;
    showScreen('charSelectScreen');
    document.getElementById('charSelectStatus').textContent = 'Both players must confirm';
  }
  
  // ---- CHARACTER SELECT ----
  function buildCharSelectUI() {
    const grid = document.getElementById('charGrid');
    grid.innerHTML = '';
    CHARACTERS.forEach((c, i) => {
      const card = document.createElement('div');
      card.className = 'char-card' + (i === 0 ? ' selected' : '');
      card.dataset.idx = i;
      card.onclick = () => {
        Audio.menuSelect();
        if (myCharConfirmed) return;
        selectedChars[0] = i;
        myCharId = i;  // track locally in case remote overwrites selectedChars
        grid.querySelectorAll('.char-card').forEach(cc => cc.classList.remove('selected'));
        card.classList.add('selected');
      };
      
      const cvs = document.createElement('canvas');
      const portraitW = c.id === 'blade' ? 160 : 120;
      cvs.width = portraitW; cvs.height = 120;
      const charImg = CharRenderer.drawChar(c.id, 'idle', 0, 1, portraitW, 120);
      cvs.getContext('2d').drawImage(charImg, 0, 0);
      card.appendChild(cvs);
      
      const name = document.createElement('div');
      name.className = 'char-name';
      name.textContent = c.name;
      card.appendChild(name);
      
      const title = document.createElement('div');
      title.className = 'char-title';
      title.textContent = c.title;
      card.appendChild(title);
      
      for (const [label, val] of [['SPD', c.stats.speed], ['PWR', c.stats.power], ['RNG', c.stats.range]]) {
        const row = document.createElement('div');
        row.className = 'stat-bar-container';
        row.innerHTML = `<span style="width:30px">${label}</span><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${val*100}%"></div></div>`;
        card.appendChild(row);
      }
      
      grid.appendChild(card);
    });
  }
  
  function confirmCharacter() {
    Audio.menuConfirm();
    myCharConfirmed = true;
    
    if (mode === 'multi') {
      Network.send({ type: 'char_select', character_id: myCharId });
      document.getElementById('charSelectStatus').textContent = remoteCharConfirmed ? 'Both confirmed!' : 'Waiting for opponent...';
      if (remoteCharConfirmed) {
        setTimeout(() => {
          gameState = 'stageSelect';
          showScreen('stageSelectScreen');
          document.getElementById('stageGrid').style.display = '';
          document.getElementById('stageConfirmBtn').style.display = '';
          document.getElementById('stageSelectScreen').querySelector('.game-title').textContent = 'Choose a Stage';
          if (!Network.getIsHost()) {
            document.getElementById('stageConfirmBtn').style.display = 'none';
            document.getElementById('stageGrid').style.display = 'none';
            document.getElementById('stageSelectScreen').querySelector('.game-title').textContent = 'Host is choosing stage...';
          }
        }, 500);
      }
    } else {
      // AI picks random character
      selectedChars[1] = Math.floor(Math.random() * CHARACTERS.length);
      gameState = 'stageSelect';
      showScreen('stageSelectScreen');
    }
  }
  
  // ---- STAGE SELECT ----
  function buildStageSelectUI() {
    const grid = document.getElementById('stageGrid');
    grid.innerHTML = '';
    STAGES.forEach((s, i) => {
      const card = document.createElement('div');
      card.className = 'stage-card' + (i === 0 ? ' selected' : '');
      card.dataset.idx = i;
      card.onclick = () => {
        Audio.menuSelect();
        selectedStage = i;
        grid.querySelectorAll('.stage-card').forEach(cc => cc.classList.remove('selected'));
        card.classList.add('selected');
      };
      
      const cvs = document.createElement('canvas');
      cvs.width = 200; cvs.height = 120;
      StageRenderer.drawPreview(cvs, s);
      card.appendChild(cvs);
      
      const name = document.createElement('div');
      name.className = 'stage-name';
      name.textContent = s.name;
      card.appendChild(name);
      
      grid.appendChild(card);
    });
  }
  
  function confirmStage() {
    Audio.menuConfirm();
    
    if (mode === 'multi') {
      Network.send({ type: 'stage_select', stage_id: selectedStage });
    }
    
    startMatch();
  }
  
  // ---- MATCH ----
  function startMatch() {
    // Assemble character selections for multiplayer
    if (mode === 'multi') {
      if (Network.getIsHost()) {
        selectedChars[0] = myCharId;
        selectedChars[1] = remoteCharId;
      } else {
        selectedChars[0] = remoteCharId;
        selectedChars[1] = myCharId;
      }
    }
    
    stage = STAGES[selectedStage];
    players = [
      new Player(0, CHARACTERS[selectedChars[0]], stage.spawns[0]),
      new Player(1, CHARACTERS[selectedChars[1]], stage.spawns[1])
    ];
    
    matchFrame = 0;
    matchActive = false;
    winner = -1;
    koSlowmoTimer = 0;
    VFX.clear();
    Projectiles.clear();
    Mines.clear();
    CharRenderer.clearCache();
    Camera.reset();
    AI.reset();
    
    gameState = 'match';
    showScreen(null);
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    
    document.getElementById('hud').classList.add('visible');
    document.getElementById('muteBtn').style.display = 'flex';
    if (Input.isMobileDevice()) document.getElementById('touchControls').style.display = 'block';
    
    updateHUD();
    Audio.matchStart();
    Music.play(stage.id);
    
    if (mode === 'multi') {
      // Lockstep: initialize sync state
      syncFrame = 0;
      localInputBuffer = {};
      pendingSyncChecks = {};
      Network.clearInputBuffer();
      
      // Pre-send INPUT_DELAY frames of idle input
      const idle = { lx: 0, ly: 0, a: false, b: false, jump: false, shield: false, grab: false };
      for (let i = 0; i < NET_INPUT_DELAY; i++) {
        localInputBuffer[i] = idle;
        Network.sendFrameInput(i, idle);
      }
      
      // Frame-based countdown (180 frames = 3 sec at 60fps)
      multiCountdown = 180;
      matchActive = true; // start lockstep immediately (countdown runs inside it)
      document.getElementById('matchStartOverlay').classList.add('active');
      document.getElementById('matchStartText').textContent = '3';
    } else {
      // Single player: timer-based countdown
      countdownPhase = 0;
      countdownTimer = 180;
      document.getElementById('matchStartOverlay').classList.add('active');
      document.getElementById('matchStartText').textContent = '3';
      
      const countdownInterval = setInterval(() => {
        countdownPhase++;
        if (countdownPhase === 1) document.getElementById('matchStartText').textContent = '2';
        else if (countdownPhase === 2) document.getElementById('matchStartText').textContent = '1';
        else if (countdownPhase === 3) {
          document.getElementById('matchStartText').textContent = 'GO!';
          matchActive = true;
        }
        else {
          document.getElementById('matchStartOverlay').classList.remove('active');
          clearInterval(countdownInterval);
        }
      }, 600);
    }
  }
  
  // ---- LOCKSTEP CHECKSUM & STATE SYNC ----
  function computeChecksum() {
    let h = 0;
    for (const p of players) {
      h = (h * 31 + Math.round(p.x * 100)) | 0;
      h = (h * 31 + Math.round(p.y * 100)) | 0;
      h = (h * 31 + Math.round(p.vx * 100)) | 0;
      h = (h * 31 + Math.round(p.vy * 100)) | 0;
      h = (h * 31 + Math.round(p.damage * 10)) | 0;
      h = (h * 31 + p.stocks) | 0;
      h = (h * 31 + p.hitstunFrames) | 0;
    }
    return h;
  }
  
  function serializeGameState() {
    return {
      players: players.map(p => p.serialize()),
      projectiles: Projectiles.getAll().map(p => ({
        owner: p.owner, x: p.x, y: p.y, vx: p.vx, vy: p.vy,
        dmg: p.dmg, baseKB: p.baseKB, kbGrowth: p.kbGrowth,
        angle: p.angle, life: p.life, maxLife: p.maxLife, w: p.w, h: p.h
      })),
      mines: Mines.getAll().map(m => ({
        owner: m.owner, x: m.x, y: m.y, dmg: m.dmg,
        baseKB: m.baseKB, kbGrowth: m.kbGrowth, angle: m.angle,
        age: m.age, life: m.life
      })),
      matchFrame,
      koSlowmoTimer
    };
  }
  
  function deserializeGameState(state) {
    for (let i = 0; i < players.length; i++) {
      players[i].deserialize(state.players[i], players);
    }
    Projectiles.setAll(state.projectiles);
    Mines.setAll(state.mines);
    matchFrame = state.matchFrame;
    koSlowmoTimer = state.koSlowmoTimer;
    console.log('State resync applied at frame ' + syncFrame);
  }
  
  // ---- MATCH UPDATE ----
  function updateMatch(p1In, p2In) {
    matchFrame++;
    
    let p1Input, p2Input;
    
    if (p1In !== undefined) {
      // Lockstep: inputs provided by caller
      p1Input = p1In;
      p2Input = p2In;
    } else {
      // Single player: read local input + AI
      const inp = Input.getState();
      p1Input = inp;
      p2Input = AI.getInput(players[1], players[0], stage);
    }
    
    updatePlayer(players[0], p1Input, players[1]);
    updatePlayer(players[1], p2Input, players[0]);
    
    // Projectile updates
    Projectiles.update();
    checkProjectileHits();
    
    // Mine updates
    Mines.update(players);
    
    // Check grabs
    checkGrabs();
    
    // Check hitbox collisions
    checkHits();
    
    // Check blast zones
    checkBlastZones();
    
    // Check ledge grabs
    checkLedgeGrabs();
    
    // Camera
    Camera.update(players[0], players[1]);
    
    // VFX
    VFX.update();
    
    // HUD
    updateHUD();
    
    // Win check
    if (winner < 0) {
      if (players[0].stocks <= 0) endMatch(1);
      else if (players[1].stocks <= 0) endMatch(0);
    }
  }
  
  function updatePlayer(player, input, opponent) {
    const p = player;
    const c = p.char;
    
    p.stateFrame++;
    p.animFrame += 0.25;
    p.wasGrounded = p.grounded;
    if (p.ledgeRegrabTimer > 0) p.ledgeRegrabTimer--;
    if (p.hitFlashFrames > 0) p.hitFlashFrames--;
    if (p.dashTimer > 0) p.dashTimer--;
    if (p.armorFrames > 0) p.armorFrames--;
    
    // If this player is being held by opponent's grab, skip all processing
    // (the grabber's grabHold code handles positioning)
    if (opponent && opponent.state === 'grabHold' && opponent.grabTarget === p) {
      return;
    }
    
    // Hitlag freeze: during hitlag, only buffer inputs, don't update state
    if (p.hitlagFrames > 0) {
      p.hitlagFrames--;
      // Safety: clamp hitlag to prevent stuck states
      if (p.hitlagFrames > HITLAG_MAX + 2) p.hitlagFrames = 0;
      // Buffer inputs during hitlag
      if (input.jump || input.a || input.b || input.grab || input.shield) {
        p.inputBuffer = { ...input };
        p.bufferTimer = INPUT_BUFFER_WINDOW;
      }
      return;
    }
    
    if (p.invFrames > 0) p.invFrames--;
    if (p.respawnTimer > 0) { p.respawnTimer--; if (p.respawnTimer === 0) p.state = 'idle'; return; }
    if (p.shieldBreakTimer > 0) { p.shieldBreakTimer--; if (p.shieldBreakTimer === 0) p.state = 'idle'; return; }
    
    // Buffer timer countdown
    if (p.bufferTimer > 0) p.bufferTimer--;
    else p.inputBuffer = null;
    
    // Buffer inputs during action lockout states
    if (input.jump || input.a || input.b || input.grab || input.shield) {
      p.inputBuffer = { ...input };
      p.bufferTimer = INPUT_BUFFER_WINDOW;
    }
    
    if (p.landingLag > 0) {
      p.landingLag--;
      if (p.landingLag === 0 && p.inputBuffer) {
        input = p.inputBuffer; // execute buffered input this frame
      }
      else return;
    }
    
    // Hitstun
    if (p.hitstunFrames > 0) {
      p.hitstunFrames--;
      p.state = 'hitstun';
      // DI: apply once on first frame of hitstun using velocity magnitude
      if (p.hitstunFrames === p.diWindow && Math.abs(input.lx) > 0.2) {

        p.shieldActive = false;
        p.state = 'shieldBreak';
        p.shieldBreakTimer = SHIELD_BREAK_STUN;
        p.vx = 0; // Don't slide during stun

      const mk = p.currentMoveKey;

        p.vx = towardStage * 2;

        p.invFrames = 8;
        p.ledgeSide = null;
        p.ledgeRegrabTimer = LEDGE_REGRAB_COOLDOWN;

      } else if (input.lx * towardStage > 0.3 || input.ly < -0.5) {

        p.state = 'ledgeClimb';
        p.ledgeClimbFrame = 0;

        p.hasDoubleJump = true;

        p.grounded = false;
        p.state = 'jump';
        p.jumpHeldFrames = 0;
        Audio.jump();
        VFX.setSquash(p.index, 0.75, 1.3);
      } else if (p.hasDoubleJump) {

        p.hasDoubleJump = false;

          p.dashTimer = DASH_DURATION;
          VFX.add('land', p.x, p.y, { duration: 8 }); // small dust puff
          Audio.dash();

        const dashMult = p.dashTimer > 0 ? DASH_SPEED_MULT : 1;
        const targetVx = input.lx * c.runSpeed * dashMult;
        // Snappy acceleration — even snappier during dash
        const accel = p.dashTimer > 0 ? 0.6 : 0.45;
        p.vx += (targetVx - p.vx) * accel;
        p.facing = newFacing;
        if (p.state !== 'jump') p.state = 'run';

        p.vx *= 0.25;
        if (Math.abs(p.vx) < 0.8) p.vx = 0;
        if (p.state === 'run') p.state = 'idle';
        p.dashTimer = 0;

      // Platform drop-through

        p.grounded = false;
        p.platform = null;
        p.y += 5;

      }

    p.prevLx = input.lx;

    if (p.attackPhase === 'none' && !p.shieldActive && p.state !== 'helpless') {

        startAttack(p, getMoveKey(p, input, 'b'));
      }
    }
    
    applyPhysics(p);
    
    // Update state for animation
    if (p.attackPhase === 'none' && p.state !== 'shield' && p.state !== 'grab' && p.state !== 'helpless') {
      // Reset combo if no buffer active (player stopped pressing attack)
      if (p.comboHit > 0 && !p.inputBuffer) p.comboHit = 0;
      if (p.grounded) {

      } else {
