<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Paper Brawl</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Patrick+Hand+SC&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { 
  width: 100%; height: 100%; overflow: hidden; 
  background: #F5E6C8;
  font-family: 'Patrick Hand', cursive;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

#gameCanvas {
  display: block;
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  image-rendering: auto;
}

#uiLayer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}

#uiLayer > * { pointer-events: auto; }

#uiLayer > .screen {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #F5E6C8;
  z-index: 20;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
#uiLayer > .screen.active { opacity: 1; pointer-events: auto; }

.paper-bg {
  background: #F5E6C8;
  background-image: 
    url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
}

.btn {
  font-family: 'Patrick Hand SC', cursive;
  font-size: 24px;
  color: #3B2F1E;
  background: #EDE0CC;
  border: 3px solid #3B2F1E;
  border-radius: 4px;
  padding: 12px 36px;
  margin: 8px;
  cursor: pointer;
  position: relative;
  transition: transform 0.1s;
  min-width: 200px;
  text-align: center;
}
.btn:hover { transform: scale(1.05); }
.btn:active { transform: scale(0.95); background: #D4C4A0; }
.btn.small { font-size: 18px; padding: 8px 20px; min-width: 120px; }

.game-title {
  font-family: 'Patrick Hand SC', cursive;
  font-size: clamp(48px, 10vw, 80px);
  color: #3B2F1E;
  text-align: center;
  margin-bottom: 30px;
  text-shadow: 2px 2px 0 #D4C4A0;
  letter-spacing: 2px;
}

.subtitle {
  font-family: 'Patrick Hand', cursive;
  font-size: 18px;
  color: #5A4A32;
  margin-bottom: 30px;
}

/* Character select */
.char-grid {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
  margin: 20px 0;
}
.char-card {
  background: #EDE0CC;
  border: 3px solid #3B2F1E;
  border-radius: 6px;
  padding: 16px;
  width: 160px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
}
.char-card:hover { transform: translateY(-4px); }
.char-card.selected { border-color: #8B0000; border-width: 4px; background: #F5E6C8; }
.char-card canvas { width: 110px; height: 110px; }
.char-name { font-family: 'Patrick Hand SC', cursive; font-size: 22px; color: #3B2F1E; margin: 8px 0 4px; }
.char-title { font-size: 14px; color: #5A4A32; margin-bottom: 8px; }
.stat-bar-container { display: flex; align-items: center; gap: 6px; margin: 3px 0; font-size: 13px; color: #3B2F1E; }
.stat-bar-bg { flex: 1; height: 8px; background: #D4C4A0; border: 1px solid #3B2F1E; border-radius: 2px; }
.stat-bar-fill { height: 100%; background: #3B2F1E; border-radius: 1px; }

/* Stage select */
.stage-grid {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
  margin: 16px auto;
  max-width: 900px;
  padding: 0 10px;
}
.stage-card {
  background: #EDE0CC;
  border: 3px solid #3B2F1E;
  border-radius: 6px;
  padding: 12px;
  width: 220px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.stage-card:hover { transform: translateY(-4px); }
.stage-card.selected { border-color: #8B0000; border-width: 4px; }
.stage-card canvas { width: 200px; height: 120px; border: 1px solid #3B2F1E; display: block; }
.stage-name { font-family: 'Patrick Hand SC', cursive; font-size: 20px; color: #3B2F1E; margin-top: 8px; }

/* Multiplayer lobby */
#lobbyScreen .room-code {
  font-family: 'Patrick Hand SC', cursive;
  font-size: 48px;
  color: #3B2F1E;
  letter-spacing: 8px;
  margin: 16px 0;
}
#lobbyScreen input {
  font-family: 'Patrick Hand', cursive;
  font-size: 28px;
  text-align: center;
  background: #EDE0CC;
  border: 3px solid #3B2F1E;
  border-radius: 4px;
  padding: 8px 16px;
  color: #3B2F1E;
  width: 200px;
  letter-spacing: 4px;
  text-transform: uppercase;
}
.status-text {
  font-size: 18px;
  color: #5A4A32;
  margin: 12px 0;
}

/* Touch controls */
#touchControls {
  position: absolute;
  bottom: 8%;
  left: 0;
  width: 100%;
  height: 40%;
  z-index: 15;
  display: none;
}
.touch-btn {
  position: absolute;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Patrick Hand SC', cursive;
  color: #3B2F1E;
  border: 2.5px solid rgba(59,47,30,0.5);
  background: rgba(237,224,204,0.6);
  -webkit-backdrop-filter: blur(2px);
  backdrop-filter: blur(2px);
  touch-action: none;
}
.touch-btn.pressed { background: rgba(212,196,160,0.8); transform: scale(0.9); }

/* HUD */
#hud {
  position: absolute;
  top: 0; left: 0; width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 8px 16px;
  z-index: 12;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s ease;
}
#hud.visible { opacity: 1; }
.hud-player {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.hud-name { font-family: 'Patrick Hand SC', cursive; font-size: 16px; color: #3B2F1E; }
.hud-damage { font-family: 'Patrick Hand SC', cursive; font-size: 36px; color: #3B2F1E; }
.hud-stocks { display: flex; gap: 4px; margin-top: 2px; }
.stock-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 2px solid #3B2F1E;
  background: #3B2F1E;
}
.stock-dot.lost { background: transparent; }

/* Overlays */
#uiLayer > .match-overlay {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 25;
  background: rgba(245,230,200,0.7);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}
#uiLayer > .match-overlay.active { opacity: 1; pointer-events: auto; }
.match-overlay-text {
  font-family: 'Patrick Hand SC', cursive;
  font-size: clamp(48px, 12vw, 96px);
  color: #3B2F1E;
  text-shadow: 3px 3px 0 #D4C4A0;
}

/* Results */
#resultsScreen .winner-text {
  font-family: 'Patrick Hand SC', cursive;
  font-size: clamp(32px, 8vw, 60px);
  color: #3B2F1E;
  margin-bottom: 20px;
}

/* Mute button */
#muteBtn {
  position: absolute;
  top: 8px; right: 8px;
  z-index: 30;
  font-size: 20px;
  width: 36px; height: 36px;
  background: rgba(237,224,204,0.7);
  border: 2px solid rgba(59,47,30,0.4);
  border-radius: 50%;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  color: #3B2F1E;
}

@media (max-width: 600px) {
  .char-card { width: 120px; padding: 10px; }
  .char-card canvas { width: 80px; height: 80px; }
  .char-name { font-size: 18px; }
  .btn { font-size: 20px; padding: 10px 24px; min-width: 160px; }
  .stage-card { width: 140px; padding: 8px; }
  .stage-card canvas { width: 120px; height: 72px; }
}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="uiLayer">
  <!-- Title Screen -->
  <div id="titleScreen" class="screen paper-bg active">
    <div class="game-title">Paper Brawl</div>
    <div class="subtitle">demo</div>
    <button class="btn" onclick="Game.startSinglePlayer()">Single Player</button>
    <button class="btn" onclick="Game.showMultiplayer()">Multiplayer</button>
  </div>

  <!-- Multiplayer Lobby -->
  <div id="lobbyScreen" class="screen paper-bg">
    <div class="game-title" style="font-size:clamp(32px,7vw,52px)">Multiplayer</div>
    <div id="lobbyCreate">
      <button class="btn" onclick="Network.createRoom()">Create Room</button>
      <div style="margin:16px;font-size:20px;color:#5A4A32">— or —</div>
      <input id="joinCodeInput" placeholder="CODE" maxlength="4">
      <br>
      <button class="btn small" onclick="Network.joinRoom()">Join Room</button>
    </div>
    <div id="lobbyWaiting" style="display:none;text-align:center">
      <div style="font-size:20px;color:#5A4A32;margin-bottom:8px">Room Code:</div>
      <div class="room-code" id="roomCodeDisplay">----</div>
      <div class="status-text" id="lobbyStatus">Waiting for opponent...</div>
    </div>
    <button class="btn small" style="margin-top:24px" onclick="Game.showScreen('titleScreen');Network.disconnect()">Back</button>
  </div>

  <!-- Character Select -->
  <div id="charSelectScreen" class="screen paper-bg">
    <div class="game-title" style="font-size:clamp(28px,6vw,44px)">Choose Your Fighter</div>
    <div class="char-grid" id="charGrid"></div>
    <div id="charSelectStatus" class="status-text"></div>
    <button class="btn" id="charConfirmBtn" onclick="Game.confirmCharacter()">Confirm</button>
  </div>

  <!-- Stage Select -->
  <div id="stageSelectScreen" class="screen paper-bg">
    <div class="game-title" style="font-size:clamp(28px,6vw,44px)">Choose a Stage</div>
    <div class="stage-grid" id="stageGrid"></div>
    <button class="btn" id="stageConfirmBtn" onclick="Game.confirmStage()">Fight!</button>
  </div>

  <!-- Match HUD -->
  <div id="hud">
    <div class="hud-player" id="hudP1">
      <div class="hud-name">P1</div>
      <div class="hud-damage" id="hudP1Dmg">0%</div>
      <div class="hud-stocks" id="hudP1Stocks"></div>
    </div>
    <div class="hud-player" id="hudP2">
      <div class="hud-name">P2</div>
      <div class="hud-damage" id="hudP2Dmg">0%</div>
      <div class="hud-stocks" id="hudP2Stocks"></div>
    </div>
  </div>

  <!-- Match overlays -->
  <div class="match-overlay" id="matchStartOverlay">
    <div class="match-overlay-text" id="matchStartText">3</div>
  </div>
  <div class="match-overlay" id="matchEndOverlay">
    <div class="match-overlay-text">GAME!</div>
  </div>

  <!-- Results Screen -->
  <div id="resultsScreen" class="screen paper-bg">
    <div class="winner-text" id="winnerText">Player 1 Wins!</div>
    <canvas id="winnerCanvas" width="200" height="200" style="margin:16px"></canvas>
    <button class="btn" id="rematchBtn" onclick="Game.rematch()">Rematch</button>
    <button class="btn small" id="quitBtn" onclick="Game.quit()">Quit</button>
  </div>

  <!-- Touch Controls -->
  <div id="touchControls"></div>

  <!-- Mute -->
  <button id="muteBtn" onclick="Audio.toggleMute()">♪</button>
</div>

<script>

// AUDIO SYSTEM
// ============================================================
const Audio = (() => {
  let ctx = null, muted = false, masterGain = null;
  
  function init() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.connect(ctx.destination);
  }
  
  function noise(duration, freq, volume = 0.3) {
    if (!ctx || muted) return;
    const bufSize = ctx.sampleRate * duration;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = freq;
    filter.Q.value = 1;
    src.connect(filter).connect(gain).connect(masterGain);
    src.start(); src.stop(ctx.currentTime + duration);
  }
  
  function tone(freq, duration, type = 'sine', volume = 0.2) {
    if (!ctx || muted) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain).connect(masterGain);
    osc.start(); osc.stop(ctx.currentTime + duration);
    return osc;
  }
  
  function sweep(startFreq, endFreq, duration, type = 'sine', volume = 0.2) {
    if (!ctx || muted) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(startFreq, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(endFreq, ctx.currentTime + duration);
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain).connect(masterGain);
    osc.start(); osc.stop(ctx.currentTime + duration);
  }
  
  return {
    init,
    suspend() { if (ctx && ctx.state === 'running') ctx.suspend(); },
    resume() { if (ctx && ctx.state === 'suspended') ctx.resume(); },
    toggleMute() { muted = !muted; document.getElementById('muteBtn').textContent = muted ? '✕' : '♪'; Music.setMuted(muted); },
    // === HITS ===
    hitLight() { init(); noise(0.05, 2000, 0.25); tone(200, 0.03, 'square', 0.15); },
    hitHeavy() { init(); noise(0.12, 800, 0.35); tone(100, 0.08, 'square', 0.2); },
    koBlast() { init(); sweep(200, 1200, 0.2, 'sawtooth', 0.3); noise(0.3, 1500, 0.4); tone(80, 0.15, 'square', 0.15); },
    // === MOVEMENT ===
    jump() { init(); sweep(300, 600, 0.08, 'sine', 0.12); },
    doubleJump() { init(); sweep(500, 900, 0.06, 'sine', 0.12); },
    land() { init(); noise(0.04, 300, 0.15); tone(120, 0.03, 'sine', 0.08); },
    dash() { init(); noise(0.03, 1500, 0.1); sweep(400, 600, 0.04, 'sine', 0.06); },
    // === SHIELD ===
    shieldUp() { init(); tone(800, 0.03, 'sine', 0.1); },
    shieldHit() { init(); noise(0.06, 1200, 0.15); tone(500, 0.08, 'triangle', 0.12); tone(600, 0.06, 'sine', 0.1); },
    shieldBreak() { init(); noise(0.4, 4000, 0.5); sweep(1200, 200, 0.3, 'sawtooth', 0.2); },
    // === GRAB ===
    grab() { init(); noise(0.06, 400, 0.2); tone(250, 0.04, 'square', 0.08); },
    throwSfx() { init(); noise(0.1, 3000, 0.2); sweep(1000, 500, 0.1, 'sine', 0.1); },
    grabBreakFree() { init(); noise(0.06, 2000, 0.15); sweep(300, 500, 0.06, 'sine', 0.1); },
    // === SPECIALS ===
    projectileFire() { init(); sweep(800, 200, 0.08, 'square', 0.15); },
    projectileHit() { init(); noise(0.05, 1800, 0.18); tone(400, 0.04, 'square', 0.12); },
    counterSuccess() { init(); tone(1000, 0.06, 'sine', 0.2); noise(0.08, 3000, 0.2); sweep(800, 1200, 0.06, 'sine', 0.12); },
    minePlace() { init(); tone(200, 0.06, 'sine', 0.1); tone(250, 0.04, 'sine', 0.08); },
    mineDetonate() { init(); noise(0.15, 600, 0.35); tone(80, 0.1, 'square', 0.2); sweep(300, 100, 0.1, 'sawtooth', 0.15); },
    // === LEDGE ===
    ledgeGrab() { init(); tone(350, 0.04, 'sine', 0.1); noise(0.03, 500, 0.08); },
    // === LIFECYCLE ===
    respawn() { init(); sweep(200, 800, 0.15, 'sine', 0.1); sweep(400, 1000, 0.12, 'sine', 0.08); },
    // === MENU ===
    menuSelect() { init(); tone(800, 0.02, 'sine', 0.1); },
    menuConfirm() { init(); tone(600, 0.08, 'sine', 0.15); setTimeout(() => tone(900, 0.08, 'sine', 0.15), 80); },
    matchStart() {
      init();

    suspend() { if (ctx && ctx.state === 'running') ctx.suspend(); },
    resume() { if (ctx && ctx.state === 'suspended') ctx.resume(); }
  };
})();

// ============================================================
// MUSIC SYSTEM — Looping BGM with crossfade
// ============================================================
const Music = (() => {
  const CROSSFADE_MS = 1500;
  const VOLUME = 0.35;
  
  // Track mapping
  const TRACKS = {
    menu: 'music/menu-theme.mp3',
    skyline: 'music/stage-skyline.mp3',
    theslab: 'music/stage-slab.mp3',
    english: 'music/stage-english.mp3',
    math: 'music/stage-math.mp3',
    art: 'music/stage-art.mp3',
    music: 'music/stage-music.mp3',
    results: 'music/results-theme.mp3'
  };
  
  let current = null;     // { audio, key, fadeGain }
  let fading = null;      // outgoing track during crossfade
  let muted = false;
  
  function load(key) {
    const src = TRACKS[key];
    if (!src) return null;
    const audio = new window.Audio();
    audio.loop = true;
    audio.volume = 0;
    audio.preload = 'auto';
    audio.src = src;
    // Graceful failure: if file not found, silently ignore
    audio.addEventListener('error', () => {
      console.warn(`Music: could not load "${src}" — skipping`);
    });
    return audio;
  }
  
  function fadeIn(audio, duration) {
    if (!audio) return;
    const target = muted ? 0 : VOLUME;
    audio.volume = 0;
    const start = performance.now();
    function step() {
      const t = Math.min((performance.now() - start) / duration, 1);
      audio.volume = target * t;
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
  
  function fadeOut(audio, duration, then) {
    if (!audio) { if (then) then(); return; }
    const startVol = audio.volume;
    if (startVol === 0) { audio.pause(); if (then) then(); return; }
    const start = performance.now();
    function step() {
      const t = Math.min((performance.now() - start) / duration, 1);
      audio.volume = startVol * (1 - t);
      if (t < 1) {
        requestAnimationFrame(step);
      } else {
        audio.pause();
        audio.currentTime = 0;
        if (then) then();
      }
    }
    requestAnimationFrame(step);
  }
  
  function play(key) {
    // Already playing this track — do nothing
    if (current && current.key === key) return;
    
    // Fade out whatever is currently playing
    if (fading) { fading.pause(); fading = null; }
    if (current) {
      fading = current.audio;
      fadeOut(fading, CROSSFADE_MS, () => { fading = null; });
    }
    
    // Load and start new track
    const audio = load(key);
    if (!audio) { current = null; return; }
    current = { audio, key };
    
    const tryPlay = () => {
      audio.play().then(() => {
        fadeIn(audio, CROSSFADE_MS);
      }).catch(() => {
        // Autoplay blocked or file missing — silently ignore
      });
    };
    
    // If audio is ready, play immediately; otherwise wait
    if (audio.readyState >= 2) {
      tryPlay();
    } else {
      audio.addEventListener('canplay', tryPlay, { once: true });
    }
  }
  
  function stop() {
    if (current) {
      fadeOut(current.audio, CROSSFADE_MS);
      current = null;
    }
  }
  
  function setMuted(m) {
    muted = m;
    if (current && current.audio) {
      current.audio.volume = m ? 0 : VOLUME;
    }
  }
  
  return { play, stop, setMuted, TRACKS,
    pause() { if (current && current.audio && !current.audio.paused) current.audio.pause(); },
    resume() { if (current && current.audio && current.audio.paused) current.audio.play().catch(() => {}); }
  };
})();

// ============================================================
// SVG CHARACTER RENDERING
// ============================================================
const CharRenderer = (() => {
  // LRU cache: Map preserves insertion order, oldest first
  const cache = new Map();
  const CACHE_MAX = 400;
  
  function drawChar(charId, state, frame, facing, w, h, extraData) {
    const squash = (extraData && extraData.squash) || 1;
    const stretch = (extraData && extraData.stretch) || 1;
    const atkProg = (extraData && extraData.attackProgress) || 0;
    const atkPhase = (extraData && extraData.attackPhase) || 'none';
    const climbProg = (extraData && extraData.ledgeClimbProgress) || 0;
    const hangSway = (extraData && extraData.ledgeHangSway) || 0;
    const moveKey = (extraData && extraData.moveKey) || '';
    const isHelpless = (extraData && extraData.isHelpless) || false;
    const isHolding = (extraData && extraData.isHolding) || false;
    // Quantize continuous values to reduce unique keys
    const qAtk = (atkProg * 10 | 0); // 0-10 steps instead of 0-1000
    const qSq = (squash * 10 | 0);
    const qSt = (stretch * 10 | 0);
    const qClimb = (climbProg * 5 | 0);
    const qSway = (hangSway * 5 | 0);
    const key = `${charId}_${state}_${frame}_${facing}_${w}_${h}_${qSq}_${qSt}_${qAtk}_${atkPhase}_${moveKey}_${qClimb}_${qSway}_${isHelpless?1:0}_${isHolding?1:0}`;
    
    if (cache.has(key)) {
      const val = cache.get(key);
      // Move to end (most recently used)
      cache.delete(key);
      cache.set(key, val);
      return val;
    }
    
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const ctx = c.getContext('2d');
    
    ctx.save();
    if (facing < 0) { ctx.translate(w, 0); ctx.scale(-1, 1); }
    
    const cx = w / 2, cy = h * 0.92;
    const s = h / 105;
    
    // Apply squash/stretch around feet
    ctx.translate(cx, cy);
    ctx.scale(squash, stretch);
    ctx.translate(-cx, -cy);
    
    ctx.strokeStyle = INK;
    ctx.lineWidth = 2.5 * s;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.fillStyle = CHAR_FILL;
    
    const extra = { climbProg, hangSway, moveKey, isHelpless, isHolding };
    if (charId === 'scrapper') drawScrapper(ctx, cx, cy, s, state, frame, atkProg, atkPhase, extra);
    else if (charId === 'blade') drawBlade(ctx, cx, cy, s, state, frame, atkProg, atkPhase, extra);
    else if (charId === 'bolt') drawBolt(ctx, cx, cy, s, state, frame, atkProg, atkPhase, extra);
    
    ctx.restore();
    
    // LRU eviction: remove oldest entries when over limit
    if (cache.size >= CACHE_MAX) {
      // Delete oldest 20% to avoid evicting every frame
      const toDelete = Math.floor(CACHE_MAX * 0.2);
      let count = 0;
      for (const k of cache.keys()) {
        if (count >= toDelete) break;
        cache.delete(k);
        count++;
      }
    }
    cache.set(key, c);
    return c;
  }
  
  // Shared drawing helpers
  function drawEllipse(ctx, x, y, rx, ry) {
    ctx.beginPath(); ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  }
  function drawCirc(ctx, x, y, r) {
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  }
  function drawLine(ctx, x1, y1, x2, y2, lw) {
    const oldW = ctx.lineWidth; ctx.lineWidth = lw || oldW;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    ctx.lineWidth = oldW;
  }
  function drawLimb(ctx, x1, y1, x2, y2, thick) {
    // Draw a filled limb with outline
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const perp = angle + Math.PI / 2;
    const dx = Math.cos(perp) * thick / 2;
    const dy = Math.sin(perp) * thick / 2;
    ctx.beginPath();
    ctx.moveTo(x1 + dx, y1 + dy);
    ctx.lineTo(x2 + dx * 0.7, y2 + dy * 0.7);
    ctx.lineTo(x2 - dx * 0.7, y2 - dy * 0.7);
    ctx.lineTo(x1 - dx, y1 - dy);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }
  function drawHand(ctx, x, y, r, s) {
    drawCirc(ctx, x, y, r * s);
  }
  function drawFoot(ctx, x, y, s, dir) {
    ctx.beginPath();
    ctx.ellipse(x + dir * 3 * s, y, 7 * s, 4 * s, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
  }
  
  function getBreathOffset(frame, s) {
    return Math.sin(frame * 0.12) * 1.5 * s;
  }
  function getRunCycle(frame) {
    // 4-frame run cycle
    const t = (frame % 16) / 16 * Math.PI * 2;
    return {
      legL: Math.sin(t) * 0.6,
      legR: Math.sin(t + Math.PI) * 0.6,
      armL: Math.sin(t + Math.PI) * 0.5,
      armR: Math.sin(t) * 0.5,
      bob: Math.abs(Math.sin(t * 2)) * 3
    };
  }
  
  // ==== SCRAPPER — Stocky brawler ====
  function drawScrapper(ctx, cx, cy, s, state, frame, atkProg, atkPhase, extra) {
    const moveKey = (extra && extra.moveKey) || '';

      ctx.beginPath();
      ctx.moveTo(cx + 6 * s, eyeY - 1 * s);
      ctx.lineTo(cx + 2.5 * s, eyeY);
      ctx.lineTo(cx + 6 * s, eyeY + 1.5 * s);
      ctx.fill();
    }
    // Small mouth
    drawLine(ctx, cx - 1.5 * s, headY + 4 * s, cx + 1.5 * s, headY + 4 * s, 1.5 * s);
    
    // Antenna / hair spike
    ctx.lineWidth = 2 * s;
    ctx.beginPath();
    ctx.moveTo(cx, headY - headR);
    ctx.quadraticCurveTo(cx + 2 * s, headY - headR - 8 * s, cx + 6 * s, headY - headR - 10 * s);
    ctx.stroke();
    
    ctx.restore();
  }
  
  function clearCache() { cache.clear(); }
  return { drawChar, clearCache };
})();

// ============================================================
// VISUAL EFFECTS (Enhanced with particles, shake, squash)
// ============================================================
const VFX = (() => {
  const effects = [];
  let shakeX = 0, shakeY = 0, shakeMag = 0, shakeDecay = 0.88;
  // Squash/stretch per player
  const playerSquash = [{ sq: 1, st: 1 }, { sq: 1, st: 1 }];
  
  function add(type, x, y, data = {}) {
    effects.push({ type, x, y, frame: 0, maxFrames: data.duration || 15, ...data });
    
    // Auto-spawn particles for certain types
    if (type === 'hit') {
      const count = data.numParticles || 5;
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * (3 + count * 0.3);
        effects.push({
          type: 'particle', x, y, frame: 0, maxFrames: 12 + Math.floor(Math.random() * 8),
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
          size: 2 + Math.random() * (2 + count * 0.2)
        });
      }
    } else if (type === 'ko') {
      // Ink burst particles
      for (let i = 0; i < 12; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 6;
        effects.push({
          type: 'particle', x, y, frame: 0, maxFrames: 20 + Math.floor(Math.random() * 10),
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 3,
          size: 3 + Math.random() * 4
        });
      }
      // Pink eraser shavings mixed into the burst
      for (let i = 0; i < 18; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 5;
        effects.push({
          type: 'eraserCrumb', x, y, frame: 0, maxFrames: 30 + Math.floor(Math.random() * 20),
          vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2,
          size: 2 + Math.random() * 5
        });
      }
    } else if (type === 'eraser') {
      // Legacy — now folded into 'ko', keep for safety but spawn nothing
    } else if (type === 'land') {
      for (let i = 0; i < 4; i++) {
        const dir = i < 2 ? -1 : 1;
        effects.push({
          type: 'dustPuff', x: x + dir * (5 + Math.random() * 10), y, frame: 0, maxFrames: 14,
          vx: dir * (1.5 + Math.random() * 2), vy: -(1 + Math.random() * 2),
          size: 4 + Math.random() * 4
        });
      }
    }
  }
  
  function addShake(magnitude) {
    shakeMag = Math.max(shakeMag, magnitude);
  }
  
  function setSquash(playerIdx, sq, st) {
    playerSquash[playerIdx].sq = sq;
    playerSquash[playerIdx].st = st;
  }
  
  function getSquash(playerIdx) { return playerSquash[playerIdx]; }
  
  function update() {
    // Shake decay
    if (shakeMag > 0.5) {
      shakeX = (Math.random() - 0.5) * shakeMag * 2;
      shakeY = (Math.random() - 0.5) * shakeMag * 2;
      shakeMag *= shakeDecay;
    } else {
      shakeX = 0; shakeY = 0; shakeMag = 0;
    }
    
    // Squash/stretch decay toward 1
    for (const ps of playerSquash) {
      ps.sq += (1 - ps.sq) * 0.2;
      ps.st += (1 - ps.st) * 0.2;
    }
    
    for (let i = effects.length - 1; i >= 0; i--) {
      const e = effects[i];
      e.frame++;
      if (e.vx !== undefined) { e.x += e.vx; e.y += e.vy; if (e.vy !== undefined) e.vy += 0.15; }
      if (e.frame >= e.maxFrames) effects.splice(i, 1);
    }
  }
  
  function getShake() { return { x: shakeX, y: shakeY }; }
  
  function draw(ctx) {
    for (const e of effects) {
      const t = e.frame / e.maxFrames;
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.globalAlpha = Math.max(0, 1 - t * 1.2);
      
      if (e.type === 'hit') {
        // Impact burst lines
        ctx.strokeStyle = INK;
        ctx.lineWidth = 2.5;
        const numLines = 8;
        for (let i = 0; i < numLines; i++) {
          const angle = (i / numLines) * Math.PI * 2 + e.frame * 0.08;
          const inner = 4 + t * 12;
          const outer = 14 + t * 28;
          ctx.beginPath();
          ctx.moveTo(Math.cos(angle) * inner, Math.sin(angle) * inner);
          ctx.lineTo(Math.cos(angle) * outer, Math.sin(angle) * outer);
          ctx.stroke();
        }
        // Impact star
        ctx.fillStyle = INK;
        ctx.beginPath();
        const sr = 8 * (1 - t);
        for (let i = 0; i < 10; i++) {
          const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
          const r = i % 2 === 0 ? sr : sr * 0.35;
          if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
          else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath();
        ctx.fill();
        
      } else if (e.type === 'ko') {
        ctx.strokeStyle = INK;
        ctx.lineWidth = 3.5;
        const numLines = 14;
        for (let i = 0; i < numLines; i++) {
          const angle = (i / numLines) * Math.PI * 2;
          const inner = 15 + t * 30;
          const outer = 35 + t * 70;
          ctx.beginPath();
          ctx.moveTo(Math.cos(angle) * inner, Math.sin(angle) * inner);
          ctx.lineTo(Math.cos(angle) * outer, Math.sin(angle) * outer);
          ctx.stroke();
        }
        // Big X in center
        const xr = 15 * (1 - t);
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(-xr, -xr); ctx.lineTo(xr, xr); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(xr, -xr); ctx.lineTo(-xr, xr); ctx.stroke();
        
      } else if (e.type === 'land') {
        // Ground impact lines
        ctx.strokeStyle = INK;
        ctx.lineWidth = 1.8;
        const spread = 15 + t * 25;
        ctx.beginPath();
        ctx.moveTo(-spread, 0);
        ctx.quadraticCurveTo(-spread * 0.5, -8 * (1 - t), 0, 0);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(spread, 0);
        ctx.quadraticCurveTo(spread * 0.5, -8 * (1 - t), 0, 0);
        ctx.stroke();
        
      } else if (e.type === 'particle') {
        ctx.fillStyle = INK;
        const sz = e.size * (1 - t * 0.7);
        ctx.beginPath();
        ctx.arc(0, 0, sz, 0, Math.PI * 2);
        ctx.fill();
        
      } else if (e.type === 'dustPuff') {
        ctx.fillStyle = `rgba(180,168,148,${0.5 * (1 - t)})`;
        const sz = e.size * (1 + t * 0.8);
        ctx.beginPath();
        ctx.arc(0, 0, sz, 0, Math.PI * 2);
        ctx.fill();
        
      } else if (e.type === 'motionLine') {
        ctx.strokeStyle = INK;
        ctx.lineWidth = 2;
        const len = (e.len || 20) * (1 - t * 0.5);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-Math.cos(e.angle || 0) * len, -Math.sin(e.angle || 0) * len);
        ctx.stroke();
        
      } else if (e.type === 'speedLine') {
        ctx.strokeStyle = INK;
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.3 * (1 - t);
        const len = (e.len || 40);
        ctx.beginPath();
        ctx.moveTo(0, e.offsetY || 0);
        ctx.lineTo(-Math.cos(e.angle || 0) * len, (e.offsetY || 0) - Math.sin(e.angle || 0) * len);
        ctx.stroke();
        
      } else if (e.type === 'eraser') {
        // Pink eraser block sweeping across
        const eraserW = 60, eraserH = 30;
        const sweep = t * 120; // how far the eraser has moved
        const dir = e.dir || 0;
        ctx.save();
        ctx.rotate(dir);
        ctx.translate(sweep, 0);
        // Eraser body
        ctx.fillStyle = '#F0A0A8';
        ctx.strokeStyle = '#C07078';
        ctx.lineWidth = 2;
        const rx = -eraserW / 2, ry = -eraserH / 2;
        // Rounded rectangle
        const r = 5;
        ctx.beginPath();
        ctx.moveTo(rx + r, ry);
        ctx.lineTo(rx + eraserW - r, ry);
        ctx.quadraticCurveTo(rx + eraserW, ry, rx + eraserW, ry + r);
        ctx.lineTo(rx + eraserW, ry + eraserH - r);
        ctx.quadraticCurveTo(rx + eraserW, ry + eraserH, rx + eraserW - r, ry + eraserH);
        ctx.lineTo(rx + r, ry + eraserH);
        ctx.quadraticCurveTo(rx, ry + eraserH, rx, ry + eraserH - r);
        ctx.lineTo(rx, ry + r);
        ctx.quadraticCurveTo(rx, ry, rx + r, ry);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        // Band on eraser
        ctx.fillStyle = '#4878A8';
        ctx.fillRect(rx + eraserW * 0.6, ry, eraserW * 0.15, eraserH);
        // Smudge trail behind eraser
        ctx.globalAlpha = 0.15 * (1 - t);
        ctx.fillStyle = '#F0A0A8';
        ctx.fillRect(rx - sweep, ry - 5, sweep, eraserH + 10);
        ctx.restore();
        
      } else if (e.type === 'eraserCrumb') {
        // Small pink/white rubber crumbs
        const crumbColor = e.size > 4 ? '#F0A0A8' : '#E8D8D0';
        ctx.fillStyle = crumbColor;
        const sz = e.size * (1 - t * 0.5);
        ctx.beginPath();
        // Irregular crumb shape (not perfect circle)
        ctx.ellipse(0, 0, sz, sz * 0.6, e.size * 0.5, 0, Math.PI * 2);
        ctx.fill();
        
      } else if (e.type === 'pencilLine') {
        // Pencil sketch lines during respawn
        ctx.strokeStyle = INK;
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = Math.min(1, t * 3) * (1 - Math.max(0, t - 0.7) * 3.3);
        const len = e.len || 15;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(e.angle || 0) * len, Math.sin(e.angle || 0) * len);
        ctx.stroke();
      }
      
      ctx.restore();
    }
  }
  
  function clear() { effects.length = 0; shakeMag = 0; shakeX = 0; shakeY = 0; }
  
  return { add, addShake, setSquash, getSquash, getShake, update, draw, clear };
})();

// ============================================================
// PROJECTILE SYSTEM
// ============================================================
const Projectiles = (() => {
  let projs = [];
  
  function spawn(owner, x, y, vx, vy, dmg, baseKB, kbGrowth, angle, life) {
    projs.push({ owner, x, y, vx, vy, dmg, baseKB, kbGrowth, angle, life, maxLife: life, w: 14, h: 10 });
  }
  
  function update() {
    for (let i = projs.length - 1; i >= 0; i--) {
      const p = projs[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
      if (p.life <= 0 || p.x < BLAST_ZONE.left || p.x > BLAST_ZONE.right || 
          p.y < BLAST_ZONE.top || p.y > BLAST_ZONE.bottom) {
        projs.splice(i, 1);
      }
    }
  }
  
  function draw(ctx) {
    for (const p of projs) {
      ctx.save();
      ctx.translate(p.x, p.y);
      const angle = Math.atan2(p.vy, p.vx);
      ctx.rotate(angle);
      // Energy bolt
      ctx.fillStyle = 'rgba(100,180,255,0.7)';
      ctx.strokeStyle = INK;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(0, 0, p.w/2, p.h/2, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // Core
      ctx.fillStyle = 'rgba(200,230,255,0.9)';
      ctx.beginPath();
      ctx.ellipse(0, 0, p.w/4, p.h/4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }
  
  function getAll() { return projs; }
  function setAll(arr) { projs = arr; }
  function countForOwner(owner) { return projs.filter(p => p.owner === owner).length; }
  function clear() { projs = []; }
  
  return { spawn, update, draw, getAll, setAll, countForOwner, clear };
})();

// ============================================================
// TRAP MINES (Bolt down-B)
// ============================================================
const Mines = (() => {
  let mines = [];
  const ARM_TIME = 20;
  const MINE_RADIUS = 18;
  
  function place(ownerIdx, x, y, dmg, baseKB, kbGrowth, angle) {
    // Remove existing mines from same owner (max 1)
    mines = mines.filter(m => m.owner !== ownerIdx);
    mines.push({ owner: ownerIdx, x, y, dmg, baseKB, kbGrowth, angle, age: 0, life: 600 });
  }
  
  function update(players) {
    mines = mines.filter(m => {
      m.age++;
      m.life--;
      if (m.life <= 0) return false;
      if (m.age < ARM_TIME) return true; // not yet armed
      
      // Check collision with non-owner players
      for (const p of players) {
        if (p.index === m.owner) continue;
        if (p.invFrames > 0 || p.respawnTimer > 0) continue;
        const dx = Math.abs(p.x - m.x);
        const dy = Math.abs((p.y - p.char.hurtbox.h / 2) - m.y);
        if (dx < MINE_RADIUS + p.char.hurtbox.w / 2 && dy < MINE_RADIUS + p.char.hurtbox.h / 2) {
          // Detonate!
          if (p.shieldActive) {
            p.shieldHP -= Math.max(4, m.dmg * 0.8);
            const pushDir = p.x > m.x ? 1 : -1;
            p.vx += pushDir * 2;
          } else if (p.armorFrames > 0 && m.dmg < 20) {
            p.damage += m.dmg;
            p.hitFlashFrames = 3;
          } else {
            p.damage += m.dmg;
            const kb = m.baseKB + (p.damage * m.kbGrowth * (200 / (p.char.weight + 100)) * (1 + p.damage * 0.006));
            const ang = m.angle * Math.PI / 180;
            const dir = p.x > m.x ? 1 : -1;
            p.vx = dir * kb * Math.cos(ang);
            p.vy = -kb * Math.sin(ang);
            p.hitstunFrames = Math.max(Math.floor(m.dmg * 1.2 + 2), Math.floor(kb * HITSTUN_MULT), 4);
            p.diWindow = p.hitstunFrames - 1;
            p.state = 'hitstun';
            p.grounded = false;
            // Release grab if mine victim was holding someone
            if (p.grabTarget) {
              p.grabTarget.state = 'idle';
              p.grabTarget.hitstunFrames = 0;
              p.grabTarget = null;
            }
          }
          Audio.mineDetonate();
          VFX.add('hit', m.x, m.y);
          VFX.addShake(6);
          return false; // remove mine
        }
      }
      return true;
    });
  }
  
  function draw(ctx) {
    for (const m of mines) {
      ctx.save();
      ctx.translate(m.x, m.y);
      const armed = m.age >= ARM_TIME;
      const pulse = armed ? 0.8 + Math.sin(m.age * 0.15) * 0.2 : 0.4;
      // Outer glow
      ctx.fillStyle = armed ? `rgba(255,180,60,${pulse * 0.3})` : 'rgba(150,150,150,0.2)';
      ctx.beginPath(); ctx.arc(0, 0, MINE_RADIUS, 0, Math.PI * 2); ctx.fill();
      // Inner dot
      ctx.fillStyle = armed ? `rgba(255,100,30,${pulse})` : 'rgba(100,100,100,0.5)';
      ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill();
      // Doodle ring
      ctx.strokeStyle = armed ? `rgba(200,120,40,${pulse * 0.6})` : 'rgba(100,100,100,0.3)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, 0, MINE_RADIUS - 3, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }
  }
  
  function getAll() { return mines; }
  function setAll(arr) { mines = arr; }
  function clear() { mines = []; }
  
  return { place, update, draw, getAll, setAll, clear };
})();

// PLAYER CLASS
// ============================================================
class Player {
  constructor(index, charDef, spawn) {
    this.index = index;
    this.char = charDef;
    this.x = spawn.x;
    this.y = spawn.y;
    this.vx = 0;
    this.vy = 0;
    this.facing = index === 0 ? 1 : -1;
    this.grounded = false;
    this.damage = 0;
    this.stocks = STOCKS;
    this.state = 'idle'; // idle, run, jump, fall, attackA, attackB, hitstun, shield, grab, grabHold, thrown, ledge, ledgeHang, ledgeClimb, shieldBreak, respawn
    this.stateFrame = 0;
    this.hasDoubleJump = true;
    this.fastFalling = false;
    this.shieldHP = SHIELD_MAX;
    this.shieldActive = false;
    this.shieldDropLag = 0;
    this.invFrames = 0;
    this.hitstunFrames = 0; this.diWindow = 0;
    this.attackPhase = 'none'; // startup, active, recovery
    this.attackFrame = 0;
    this.comboHit = 0;
    this.currentMove = null;
    this.grabTarget = null;
    this.grabTimer = 0;
    this.ledgeSide = null;
    this.ledgeClimbFrame = 0;
    this.ledgeHangTimer = 0;
    this.ledgeRegrabTimer = 0;
    this.ledgeSettleTimer = 0;
    this.ledgeX = 0;
    this.ledgeY = 0;
    this.shieldBreakTimer = 0;
    this.respawnTimer = 0;
    this.animFrame = 0;
    this.landingLag = 0;
    this.canAct = true;
    this.lastHitBy = -1;
    this.platform = null; // current platform standing on
    this.dropThrough = false;
    this.jumpHeld = false;
    this.jumpHeldFrames = 0;
    this.wasGrounded = false;
    // New gameplay systems
    this.hitlagFrames = 0;
    this.hitFlashFrames = 0;
    this.inputBuffer = null;
    this.bufferTimer = 0;
    this.dashTimer = 0;
    this.prevLx = 0;
    this.koSlowmo = 0;
    this.koZoomTarget = null;
    // Expanded moveset systems
    this.currentMoveKey = null;
    this.usedUpB = false;
    this.counterActive = 0;  // frames remaining in counter window
    this.armorFrames = 0;    // super armor frames remaining
  }
  
  serialize() {
    return {
      x: this.x, y: this.y, vx: this.vx, vy: this.vy,
      facing: this.facing, grounded: this.grounded,
      damage: this.damage, stocks: this.stocks,
      state: this.state, stateFrame: this.stateFrame,
      hasDoubleJump: this.hasDoubleJump, fastFalling: this.fastFalling,
      shieldHP: this.shieldHP, shieldActive: this.shieldActive,
      shieldDropLag: this.shieldDropLag, invFrames: this.invFrames,
      hitstunFrames: this.hitstunFrames, diWindow: this.diWindow,
      attackPhase: this.attackPhase, attackFrame: this.attackFrame,
      comboHit: this.comboHit, currentMoveKey: this.currentMoveKey,
      grabTargetIdx: this.grabTarget ? this.grabTarget.index : -1,
      grabTimer: this.grabTimer,
      ledgeSide: this.ledgeSide, ledgeClimbFrame: this.ledgeClimbFrame,
      ledgeHangTimer: this.ledgeHangTimer, ledgeRegrabTimer: this.ledgeRegrabTimer,
      ledgeSettleTimer: this.ledgeSettleTimer, ledgeX: this.ledgeX, ledgeY: this.ledgeY,
      shieldBreakTimer: this.shieldBreakTimer, respawnTimer: this.respawnTimer,
      landingLag: this.landingLag, dropThrough: this.dropThrough,
      hitlagFrames: this.hitlagFrames, hitFlashFrames: this.hitFlashFrames,
      dashTimer: this.dashTimer, prevLx: this.prevLx,
      usedUpB: this.usedUpB, counterActive: this.counterActive,
      armorFrames: this.armorFrames
    };
  }
  
  deserialize(d, allPlayers) {
    this.x = d.x; this.y = d.y; this.vx = d.vx; this.vy = d.vy;
    this.facing = d.facing; this.grounded = d.grounded;
    this.damage = d.damage; this.stocks = d.stocks;
    this.state = d.state; this.stateFrame = d.stateFrame;
    this.hasDoubleJump = d.hasDoubleJump; this.fastFalling = d.fastFalling;
    this.shieldHP = d.shieldHP; this.shieldActive = d.shieldActive;
    this.shieldDropLag = d.shieldDropLag; this.invFrames = d.invFrames;
    this.hitstunFrames = d.hitstunFrames; this.diWindow = d.diWindow;
    this.attackPhase = d.attackPhase; this.attackFrame = d.attackFrame;
    this.comboHit = d.comboHit;
    this.currentMoveKey = d.currentMoveKey;
    this.currentMove = d.currentMoveKey ? this.char.moves[d.currentMoveKey] : null;
    this.grabTarget = d.grabTargetIdx >= 0 ? allPlayers[d.grabTargetIdx] : null;
    this.grabTimer = d.grabTimer;
    this.ledgeSide = d.ledgeSide; this.ledgeClimbFrame = d.ledgeClimbFrame;
    this.ledgeHangTimer = d.ledgeHangTimer; this.ledgeRegrabTimer = d.ledgeRegrabTimer;
    this.ledgeSettleTimer = d.ledgeSettleTimer; this.ledgeX = d.ledgeX; this.ledgeY = d.ledgeY;
    this.shieldBreakTimer = d.shieldBreakTimer; this.respawnTimer = d.respawnTimer;
    this.landingLag = d.landingLag; this.dropThrough = d.dropThrough;
    this.hitlagFrames = d.hitlagFrames; this.hitFlashFrames = d.hitFlashFrames;
    this.dashTimer = d.dashTimer; this.prevLx = d.prevLx;
    this.usedUpB = d.usedUpB; this.counterActive = d.counterActive;
    this.armorFrames = d.armorFrames;
  }
  
  get hurtbox() {
    const hb = this.char.hurtbox;
    return { x: this.x - hb.w/2, y: this.y - hb.h, w: hb.w, h: hb.h };
  }
  
  getActiveHitbox() {
    if (this.attackPhase !== 'active' || !this.currentMove) return null;
    const m = this.currentMove;
    const hb = m.hb;
    if (!hb) return null;
    return {
      x: this.x + (this.facing > 0 ? hb.x : -hb.x - hb.w),
      y: this.y - this.char.hurtbox.h + hb.y + this.char.hurtbox.h / 2,
      w: hb.w,
      h: hb.h
    };
  }
  
  reset(spawn) {
    this.x = spawn.x;
    this.y = spawn.y;
    this.vx = 0; this.vy = 0;
    this.damage = 0;
    this.state = 'idle';
    this.stateFrame = 0;
    this.hasDoubleJump = true;
    this.fastFalling = false;
    this.shieldHP = SHIELD_MAX;
    this.shieldActive = false;
    this.invFrames = 0;
    this.hitstunFrames = 0; this.diWindow = 0;
    this.attackPhase = 'none';
    this.comboHit = 0;
    this.currentMove = null;
    this.currentMoveKey = null;
    this.usedUpB = false;
    this.counterActive = 0;
    this.armorFrames = 0;
    this.grabTarget = null;
    this.grabTimer = 0;
    this.ledgeSide = null;
    this.ledgeHangTimer = 0;
    this.ledgeRegrabTimer = 0;
    this.ledgeSettleTimer = 0;
    this.ledgeX = 0;
    this.ledgeY = 0;
    this.shieldBreakTimer = 0;
    this.respawnTimer = 0;
    this.landingLag = 0;
    this.animFrame = 0;
    this.dropThrough = false;
    this.hitlagFrames = 0;
    this.hitFlashFrames = 0;
    this.inputBuffer = null;
    this.bufferTimer = 0;
    this.dashTimer = 0;
  }
  
  respawn(pos) {
    this.x = pos.x;
    this.y = pos.y;
    this.vx = 0; this.vy = 0;
    this.damage = 0;
    this.state = 'respawn';
    this.invFrames = RESPAWN_INV_FRAMES;
    this.hasDoubleJump = true;
    this.fastFalling = false;
    this.shieldHP = SHIELD_MAX;
    this.attackPhase = 'none';
    this.currentMove = null;
    this.currentMoveKey = null;
    this.usedUpB = false;
    this.counterActive = 0;
    this.armorFrames = 0;
    this.grabTarget = null;
    this.ledgeSide = null;
    this.ledgeHangTimer = 0;
    this.ledgeRegrabTimer = 0;
    this.ledgeSettleTimer = 0;
    this.shieldBreakTimer = 0;
    this.landingLag = 0;
    this.hitstunFrames = 0; this.diWindow = 0;
    this.respawnTimer = 60;
    this.animFrame = 0;
    this.hitlagFrames = 0;
    this.hitFlashFrames = 0;
    this.inputBuffer = null;
    this.bufferTimer = 0;
    this.dashTimer = 0;
    
    // Pencil redraw VFX — sketch lines around spawn point
    for (let i = 0; i < 10; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 10 + Math.random() * 25;
      VFX.add('pencilLine', this.x + Math.cos(angle) * dist, this.y - this.char.hurtbox.h / 2 + Math.sin(angle) * dist, {
        duration: 30 + Math.floor(Math.random() * 20),
        angle: angle + (Math.random() - 0.5) * 0.5,
        len: 8 + Math.random() * 15
      });
    }
  }
}

// AI OPPONENT
// ============================================================
const AI = (() => {
  let state = 'idle', timer = 0, reactionDelay = 0;
  
  function getInput(aiPlayer, humanPlayer, stage) {
    const input = { lx: 0, ly: 0, a: false, b: false, jump: false, shield: false, grab: false };
    
    if (aiPlayer.respawnTimer > 0 || aiPlayer.hitstunFrames > 0 || aiPlayer.shieldBreakTimer > 0) return input;
    
    // AI in grab hold: throw after short delay
    if (aiPlayer.state === 'grabHold') {
      // Wait a few frames then throw in a smart direction
      if (aiPlayer.grabTimer < GRAB_HOLD_FRAMES - 8) {
        const r = Math.random();
        if (humanPlayer.damage > 100 && r < 0.4) { input.ly = -0.8; } // up throw for kill
        else if (r < 0.6) { input.lx = aiPlayer.facing * 0.9; } // forward throw
        else if (r < 0.8) { input.lx = -aiPlayer.facing * 0.9; } // back throw
        else { input.a = true; } // default forward throw
      }
      return input;
    }
    
    timer--;
    if (reactionDelay > 0) { reactionDelay--; return input; }
    
    const dx = humanPlayer.x - aiPlayer.x;
    const dy = humanPlayer.y - aiPlayer.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const mainPlat = stage.mainPlatform;
    const onStage = aiPlayer.x > mainPlat.x && aiPlayer.x < mainPlat.x + mainPlat.w;
    const isOffstage = !onStage && !aiPlayer.grounded;
    
    if (timer <= 0) {
      // State transitions
      if (isOffstage) {
        state = 'recover';
      } else if (aiPlayer.damage > 100 && dist < 150) {
        state = Math.random() < 0.3 ? 'retreat' : 'attack';
      } else if (dist < 120) {
        state = Math.random() < 0.15 ? 'shield' : 'attack';
      } else {
        state = 'approach';
      }
      timer = 15 + Math.floor(Math.random() * 20);
      reactionDelay = 10 + Math.floor(Math.random() * 6);
    }
    
    switch (state) {
      case 'approach':
        input.lx = dx > 30 ? 1 : dx < -30 ? -1 : 0;
        if (dy < -80 && aiPlayer.grounded) input.jump = true;
        // Occasionally approach with side-B
        if (dist < 200 && dist > 80 && Math.random() < 0.08) {
          input.b = true;
          input.lx = dx > 0 ? 1 : -1; // trigger sideB
        }
        break;
      case 'attack':
        input.lx = dx > 20 ? 0.5 : dx < -20 ? -0.5 : 0;
        if (dist < 100) {
          const r = Math.random();
          if (aiPlayer.grounded) {
            if (r < 0.3) { input.a = true; } // jab (neutral)
            else if (r < 0.5) { input.a = true; input.lx = dx > 0 ? 0.8 : -0.8; } // ftilt
            else if (r < 0.6) { input.a = true; input.ly = -0.8; } // utilt
            else if (r < 0.7) { input.a = true; input.ly = 0.8; } // dtilt
            else if (r < 0.8) { input.b = true; } // neutralB
            else if (r < 0.85) { input.grab = true; }
            else if (r < 0.95) { input.a = true; input.lx = dx > 0 ? 0.8 : -0.8; } // ftilt
            else { input.b = true; input.ly = 0.8; } // downB
          } else {
            // Aerial attacks — vary direction
            if (r < 0.3) { input.a = true; } // nair
            else if (r < 0.5) { input.a = true; input.lx = dx > 0 ? 0.8 : -0.8; } // fair
            else if (r < 0.65) { input.a = true; input.ly = -0.8; } // uair
            else if (r < 0.8) { input.a = true; input.ly = 0.8; } // dair
            else { input.a = true; input.lx = dx > 0 ? -0.8 : 0.8; } // bair
          }
        }
        break;
      case 'retreat':
        input.lx = dx > 0 ? -1 : 1;
        if (Math.random() < 0.1 && aiPlayer.grounded) input.jump = true;
        // Projectile zoning while retreating
        if (aiPlayer.char.moves.neutralB && aiPlayer.char.moves.neutralB.projectile && Math.random() < 0.15) {
          input.b = true;
        }
        break;
      case 'recover': {
        // Smart recovery: drift toward stage center
        const stageCX = mainPlat.x + mainPlat.w / 2;
        input.lx = aiPlayer.x < stageCX ? 1 : -1;
        // Use double jump first
        if (!aiPlayer.grounded && aiPlayer.hasDoubleJump && aiPlayer.vy > 0) {
          input.jump = true;
        }
        // Use Up-B when double jump is gone and falling
        if (!aiPlayer.grounded && !aiPlayer.hasDoubleJump && !aiPlayer.usedUpB && aiPlayer.vy > 0) {
          input.b = true;
          input.ly = -0.8; // upB
        }
        break;
      }
      case 'shield':
        if (dist < 120) input.shield = true;
        else { state = 'approach'; timer = 0; }
        break;
    }
    
    return input;
  }
  
  function reset() { state = 'idle'; timer = 0; reactionDelay = 0; }
  
  return { getInput, reset };
})();
