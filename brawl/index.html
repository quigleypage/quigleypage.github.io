  }
  
  function getMoveKey(player, input, button) {
    const lx = input.lx || 0, ly = input.ly || 0;
    const forward = lx * player.facing > 0.3;
    const backward = lx * player.facing < -0.3;
    const up = ly < -0.5;
    const down = ly > 0.5;
    
    if (button === 'a') {
      if (player.grounded) {
        if (up) return 'utilt';
        if (down) return 'dtilt';
        if (forward || backward) return 'ftilt';
        return 'jab';
      } else {
        if (up) return 'uair';
        if (down) return 'dair';
        if (backward) return 'bair';
        if (forward) return 'fair';
        return 'nair';
      }
    } else if (button === 'b') {
      // Slightly more forgiving up threshold for specials (mobile joystick)
      if (ly < -0.4) return 'upB';
      if (down) return 'downB';
      if (forward || backward) return 'sideB';
      return 'neutralB';
    }
    return 'jab';
  }
  
  function startAttack(player, moveKey) {
    const moveDef = player.char.moves[moveKey];
    if (!moveDef) return;
    
    // Up-B: only one per airborne period
    if (moveDef.recovery_move && player.usedUpB) return;
    
    // Counter: enter counter state
    if (moveDef.counterWindow) {
      player.currentMove = moveDef;
      player.currentMoveKey = moveKey;
      player.attackPhase = 'startup';
      player.attackFrame = 0;
      player.counterActive = 0;
      return;
    }
    
    // Trap mine: place it
    if (moveDef.placeMine) {
      player.currentMove = moveDef;
      player.currentMoveKey = moveKey;
      player.attackPhase = 'startup';
      player.attackFrame = 0;
      return;
    }
    
    // Handle combo moves (jabs)
    if (moveDef.hits) {
      const hitIdx = Math.min(player.comboHit, moveDef.hits.length - 1);
      player.currentMove = moveDef.hits[hitIdx];
      player.comboHit++;
    } else {
      player.currentMove = moveDef;
      player.comboHit = 0;
    }
    
    player.currentMoveKey = moveKey;
    
    // Projectile check (max 2 active)
    if (player.currentMove.projectile) {
      if (Projectiles.countForOwner(player.index) >= 2) {
        player.currentMove = null;
        player.currentMoveKey = null;
        return;
      }
    }
    
    player.attackPhase = 'startup';
    player.attackFrame = 0;
    
    // NOTE: Projectile spawn and Up-B impulse are handled deterministically
    // at the startup→active phase transition in updatePlayer, NOT via setTimeout.
    
    // Motion line VFX
    let vfxAngle = player.facing > 0 ? 0 : Math.PI;
    if (moveKey === 'uair' || moveKey === 'utilt' || moveKey === 'upB') vfxAngle = -Math.PI / 2;
    else if (moveKey === 'dair' || moveKey === 'dtilt' || moveKey === 'downB') vfxAngle = Math.PI / 2;
    VFX.add('motionLine', player.x + player.facing * 20, player.y - player.char.hurtbox.h / 2, {
      angle: vfxAngle, len: 25, duration: 8
    });
  }
  
  function applyPhysics(player) {
    const p = player;
    const c = p.char;
    
    // Gravity
    if (!p.grounded) {
      const maxFall = p.fastFalling ? FAST_FALL_SPEED : c.fallSpeed;
      p.vy += GRAVITY;
      if (p.vy > maxFall) p.vy = maxFall;
    }
    
    // Apply velocity
    p.x += p.vx;
    p.y += p.vy;
    
    // Stage collision
    if (stage) {
      const hb = p.char.hurtbox;
      const feet = p.y;
      const prevFeet = feet - p.vy;
      
      // Main platform (solid — can't pass through)
      const mp = stage.mainPlatform;
      if (p.x > mp.x + 5 && p.x < mp.x + mp.w - 5) {
        // Top
        if (prevFeet <= mp.y + 2 && feet >= mp.y && p.vy >= 0) {
          p.y = mp.y;
          land(p);
          p.platform = mp;
        }
        // Bottom (if inside)
        if (feet > mp.y && feet < mp.y + mp.h + hb.h && p.vy < 0) {
          // Bonk head
          if (prevFeet >= mp.y + mp.h) {
            p.y = mp.y + mp.h + 1;
            p.vy = 0;
          }
        }
        // Sides
        if (feet > mp.y && feet < mp.y + mp.h + hb.h) {
          if (p.x < mp.x + hb.w/2 + 5 && p.vx > 0) { p.x = mp.x - hb.w/2; p.vx = 0; }
          if (p.x > mp.x + mp.w - hb.w/2 - 5 && p.vx < 0) { p.x = mp.x + mp.w + hb.w/2; p.vx = 0; }
        }
      }
      
      // Passable platforms
      if (!p.dropThrough) {
        for (const plat of stage.platforms) {
          if (plat.passable && p.x > plat.x + 5 && p.x < plat.x + plat.w - 5) {
            if (prevFeet <= plat.y + 2 && feet >= plat.y && p.vy >= 0) {
              p.y = plat.y;
              land(p);
              p.platform = plat;
            }
          }
        }
      }
      
      // Reset drop-through
      if (p.dropThrough && p.vy > 2) p.dropThrough = false;
      
      // If not on any platform, not grounded
      if (p.grounded) {
        let onPlatform = false;
        if (p.x > mp.x + 5 && p.x < mp.x + mp.w - 5 && Math.abs(p.y - mp.y) < 3) {
          onPlatform = true;
        }
        for (const plat of stage.platforms) {
          if (p.x > plat.x + 5 && p.x < plat.x + plat.w - 5 && Math.abs(p.y - plat.y) < 3) {
            onPlatform = true;
          }
        }
        if (!onPlatform) {
          p.grounded = false;
          p.platform = null;
        }
      }
    }
  }
  
  function land(p) {
    if (!p.grounded) {
      p.grounded = true;
      p.vy = 0;
      p.hasDoubleJump = true;
      p.fastFalling = false;
      p.usedUpB = false; // reset recovery move on landing
      // Landing during helpless: extra lag
      if (p.state === 'helpless') {
        p.landingLag = 10;
        p.state = 'idle';
        p.attackPhase = 'none';
        p.currentMove = null;
        p.currentMoveKey = null;
      } else if (p.attackPhase !== 'none') {
        const m = p.currentMove;
        // Auto-cancel: skip landing lag during late recovery of aerials
        if (p.attackPhase === 'recovery' && m) {
          const recovProg = p.attackFrame / Math.max(1, m.recovery);
          if (recovProg > AUTOCANCEL_WINDOW) {
            p.landingLag = 2; // minimal lag
          } else {
            // Use move-specific landing lag, or default
            p.landingLag = m.landLag || 4;
          }
        } else {
          p.landingLag = m && m.landLag ? m.landLag : 4;
        }
        p.attackPhase = 'none';
        p.currentMove = null;
        p.currentMoveKey = null;
      }
      if (!p.wasGrounded) {
        VFX.add('land', p.x, p.y, { duration: 12 });
        VFX.setSquash(p.index, 1.3, 0.7);
        Audio.land();
      }
    }
  }
  
  function calcKnockback(baseKB, kbGrowth, damage, weight) {
    return baseKB + (damage * kbGrowth * (200 / (weight + 100)) * (1 + damage * 0.006));
  }
  
  function calcHitstun(kb, moveDmg) {
    // Damage-based floor ensures combos at low %; KB-based scales at high %
    return Math.max(Math.floor(moveDmg * 1.2 + 2), Math.floor(kb * HITSTUN_MULT), 4);
  }
  
  function checkHits() {
    for (let i = 0; i < 2; i++) {
      const attacker = players[i];
      const target = players[1 - i];
      
      if (attacker.attackPhase !== 'active') continue;
      if (target.invFrames > 0) continue;
      if (target.state === 'ledge') continue;
      
      const hitbox = attacker.getActiveHitbox();
      if (!hitbox) continue;
      
      const hurtbox = target.hurtbox;
      
      if (rectsOverlap(hitbox, hurtbox)) {
        // Counter check: if target is in counter window, trigger riposte
        if (target.counterActive > 0 && !target.shieldActive) {
          const counterMove = target.currentMove;
          const counterMult = counterMove ? (counterMove.counterMult || 1.2) : 1.2;
          const riposteDmg = Math.floor(attacker.currentMove.dmg * counterMult);
          // Counter succeeds! Hit the attacker instead
          target.counterActive = 0;
          target.invFrames = 12;
          target.attackPhase = 'recovery';
          target.attackFrame = 0;
          attacker.damage += riposteDmg;
          const counterKB = calcKnockback(6, 0.08, attacker.damage, attacker.char.weight);
          attacker.vx = target.facing * counterKB * Math.cos(40 * Math.PI / 180);
          attacker.vy = -counterKB * Math.sin(40 * Math.PI / 180);
          attacker.hitstunFrames = calcHitstun(counterKB, riposteDmg);
          attacker.diWindow = attacker.hitstunFrames - 1;
          attacker.state = 'hitstun';
          attacker.grounded = false;
          attacker.attackPhase = 'none';
          attacker.currentMove = null;
          attacker.currentMoveKey = null;
          const hitX = (hitbox.x + hitbox.w/2 + hurtbox.x + hurtbox.w/2) / 2;
          const hitY = (hitbox.y + hitbox.h/2 + hurtbox.y + hurtbox.h/2) / 2;
          VFX.add('hit', hitX, hitY, { duration: 14, numParticles: 8 });
          VFX.addShake(8);
          Audio.counterSuccess();
          Camera.zoomPunch(0.08);
          continue;
        }
        
        if (target.shieldActive) {
          // Shield hit — scaled drain and pushback
          const m = attacker.currentMove;
          const drain = Math.max(4, m.dmg * 0.8 + 2);
          target.shieldHP -= drain;
          // Pushback: push defender away from attacker
          target.vx += attacker.facing * (2 + m.dmg * 0.15);
          Audio.shieldHit();
          VFX.add('hit', (hitbox.x + hitbox.w/2 + hurtbox.x + hurtbox.w/2) / 2, (hitbox.y + hurtbox.y) / 2, { duration: 10 });
          attacker.attackPhase = 'recovery';
          attacker.attackFrame = 0;
          // Light hitlag on shield
          attacker.hitlagFrames = 2;
          target.hitlagFrames = 2;
        } else {
          // Hit!
          const m = attacker.currentMove;
          target.damage += m.dmg;
          
          // Armor check: take damage but no knockback
          if (target.armorFrames > 0 && m.dmg < 20) {
            // Armored through! Reduced hitlag, no knockback
            attacker.hitlagFrames = 3;
            target.hitlagFrames = 2;
            target.hitFlashFrames = 3;
            const hitX = (hitbox.x + hitbox.w/2 + hurtbox.x + hurtbox.w/2) / 2;
            const hitY = (hitbox.y + hitbox.h/2 + hurtbox.y + hurtbox.h/2) / 2;
            VFX.add('hit', hitX, hitY, { duration: 6, numParticles: 2 });
            Audio.shieldHit();
            attacker.attackPhase = 'recovery';
            attacker.attackFrame = 0;
            continue;
          }
          
          const kb = calcKnockback(m.baseKB, m.kbGrowth, target.damage, target.char.weight);
          const angle = (m.angle || 45) * Math.PI / 180;
          target.vx = attacker.facing * kb * Math.cos(angle);
          target.vy = -kb * Math.sin(angle);
          target.hitstunFrames = calcHitstun(kb, m.dmg);
          target.diWindow = target.hitstunFrames - 1;
          target.state = 'hitstun';
          target.grounded = false;
          target.lastHitBy = i;
          target.ledgeSide = null;
          
          // Release grab if hit target was holding someone
          if (target.grabTarget) {
            target.grabTarget.state = 'idle';
            target.grabTarget.hitstunFrames = 0;
            target.grabTarget = null;
          }
          // Release grab if hit target was being held
          if (attacker.grabTarget === target) {
            attacker.grabTarget = null;
            attacker.state = 'idle';
          }
          // Check if the OTHER player was holding this target
          const other = players[1 - i];
          if (other !== attacker && other.grabTarget === target) {
            other.grabTarget = null;
            if (other.state === 'grabHold') other.state = 'idle';
          }
          
          // Hitlag: freeze both, attacker shorter for combo flow
          const hitlagAmount = Math.min(HITLAG_MAX, Math.floor(HITLAG_BASE + m.dmg * HITLAG_PER_DMG));
          target.hitlagFrames = hitlagAmount;
          attacker.hitlagFrames = Math.max(2, Math.floor(hitlagAmount * HITLAG_ATTACKER_MULT));
          
          // Hit flash on target
          target.hitFlashFrames = 3;
          
          // Scaled audio and screen shake
          if (m.dmg >= 10) {
            Audio.hitHeavy();
            VFX.addShake(6 + kb * 0.6);
            Camera.zoomPunch(0.06 + kb * 0.003);
          } else {
            Audio.hitLight();
            VFX.addShake(3 + kb * 0.2);
            Camera.zoomPunch(0.03);
          }
          VFX.setSquash(1 - i, 1.3, 0.7);
          
          // Scaled impact particles: more at high damage
          const hitX = (hitbox.x + hitbox.w/2 + hurtbox.x + hurtbox.w/2) / 2;
          const hitY = (hitbox.y + hitbox.h/2 + hurtbox.y + hurtbox.h/2) / 2;
          const numParticles = Math.min(12, 3 + Math.floor(target.damage / 30));
          VFX.add('hit', hitX, hitY, { duration: 10 + Math.min(6, kb), numParticles });
          
          // Speed lines behind launched target
          const numLines = kb > 8 ? 5 : 3;
          for (let sl = 0; sl < numLines; sl++) {
            const launchAngle = Math.atan2(target.vy, target.vx);
            VFX.add('speedLine', target.x, target.y - target.char.hurtbox.h / 2, {
              angle: launchAngle + Math.PI, len: 30 + kb * 3 + Math.random() * 20,
              offsetY: (Math.random() - 0.5) * 20, duration: 10 + Math.floor(kb)
            });
          }
          
          // KO check: if this hit will likely KO, trigger slow-mo + zoom
          if (kb > 12 && target.damage > 80) {
            koSlowmoTimer = KO_SLOWMO_FRAMES;
            Camera.zoomPunch(KO_ZOOM_AMOUNT);
          }
          
          // Attacker continues to recovery
          attacker.attackPhase = 'recovery';
          attacker.attackFrame = 0;
        }
      }
    }
  }
  
  function checkProjectileHits() {
    const projs = Projectiles.getAll();
    for (let i = projs.length - 1; i >= 0; i--) {
      const proj = projs[i];
      for (let pi = 0; pi < 2; pi++) {
        if (pi === proj.owner) continue;
        const target = players[pi];
        if (target.invFrames > 0) continue;
        
        const projRect = { x: proj.x - proj.w/2, y: proj.y - proj.h/2, w: proj.w, h: proj.h };
        const hurtbox = target.hurtbox;
        
        if (rectsOverlap(projRect, hurtbox)) {
          // Counter check
          if (target.counterActive > 0 && !target.shieldActive) {
            target.counterActive = 0;
            target.invFrames = 12;
            target.attackPhase = 'recovery';
            target.attackFrame = 0;
            Audio.shieldHit();
            VFX.add('hit', proj.x, proj.y, { duration: 10, numParticles: 4 });
            projs.splice(i, 1);
            break;
          }
          
          if (target.shieldActive) {
            target.shieldHP -= Math.max(4, proj.dmg * 0.8);
            // Shield pushback
            const pushDir = proj.vx > 0 ? 1 : -1;
            target.vx += pushDir * 1.5;
            Audio.shieldHit();
          } else if (target.armorFrames > 0 && proj.dmg < 20) {
            // Armored through projectile
            target.damage += proj.dmg;
            target.hitFlashFrames = 3;
            Audio.shieldHit();
          } else {
            target.damage += proj.dmg;
            const kb = calcKnockback(proj.baseKB, proj.kbGrowth, target.damage, target.char.weight);
            const angle = (proj.angle || 30) * Math.PI / 180;
            const dir = proj.vx > 0 ? 1 : -1;
            target.vx = dir * kb * Math.cos(angle);
            target.vy = -kb * Math.sin(angle);
            target.hitstunFrames = calcHitstun(kb, proj.dmg);
            target.diWindow = target.hitstunFrames - 1;
            target.state = 'hitstun';
            target.grounded = false;
            target.ledgeSide = null;
            target.hitlagFrames = Math.min(HITLAG_MAX, Math.floor(HITLAG_BASE + proj.dmg * HITLAG_PER_DMG));
            target.hitFlashFrames = 3;
            // Release grab if hit target was holding someone
            if (target.grabTarget) {
              target.grabTarget.state = 'idle';
              target.grabTarget.hitstunFrames = 0;
              target.grabTarget = null;
            }
            Audio.projectileHit();
            VFX.addShake(3 + kb * 0.3);
            Camera.zoomPunch(0.03);
          }
          VFX.add('hit', proj.x, proj.y, { duration: 10 });
          projs.splice(i, 1);
          break;
        }
      }
    }
  }
  
  function checkGrabs() {
    for (let i = 0; i < 2; i++) {
      const p = players[i];
      const t = players[1 - i];
      
      if (p.state !== 'grab') continue;
      const grabDef = p.char.moves.grab;
      const grabFrame = (grabDef.startup + grabDef.active + grabDef.recovery) - p.grabTimer;
      
      if (grabFrame >= grabDef.startup && grabFrame < grabDef.startup + grabDef.active) {
        if (t.invFrames > 0 || t.state === 'ledge' || t.state === 'ledgeClimb' || t.state === 'ledgeHang') continue;
        if (t.hitstunFrames > 0 || t.state === 'grabHold') continue; // can't grab someone in knockback or already holding
        // Grab beats shield — intentionally allow grab on shielding opponents
        
        const dx = t.x - p.x;
        if (Math.abs(dx) < grabDef.range && Math.abs(t.y - p.y) < 65 && dx * p.facing > -20) {
          // Grab connects!
          p.state = 'grabHold';
          p.grabTarget = t;
          p.grabTimer = GRAB_HOLD_FRAMES;
          p.vx = 0; p.vy = 0; // Stop grabber dead
          t.state = 'hitstun';
          t.shieldActive = false;
          t.vx = 0; t.vy = 0;
          Audio.grab();
          // Grab connect VFX
          VFX.add('hit', (p.x + t.x) / 2, (p.y + t.y) / 2 - 25, { duration: 10 });
          VFX.addShake(3);
        }
      }
    }
  }
  
  function checkBlastZones() {
    for (const p of players) {
      if (p.stocks <= 0) continue;
      if (p.respawnTimer > 0) continue;
      
      if (p.x < BLAST_ZONE.left || p.x > BLAST_ZONE.right ||
          p.y < BLAST_ZONE.top || p.y > BLAST_ZONE.bottom) {
        // KO!
        p.stocks--;
        Audio.koBlast();
        VFX.addShake(12);
        VFX.add('ko', p.x, p.y - 30, { duration: 25 });
        
        // Release any grabs involving this player
        for (const other of players) {
          if (other.grabTarget === p) {
            other.grabTarget = null;
            if (other.state === 'grabHold') other.state = 'idle';
          }
        }
        if (p.grabTarget) {
          p.grabTarget.state = 'idle';
          p.grabTarget.hitstunFrames = 0;
          p.grabTarget = null;
        }
        
        if (p.stocks > 0) {
          p.respawn(stage.respawn);
          Audio.respawn();
        }
        updateHUD();
      }
    }
  }
  
  function checkLedgeGrabs() {
    for (const p of players) {
      if (p.grounded || p.state === 'ledge' || p.state === 'ledgeHang' || p.state === 'ledgeClimb') continue;
      if (p.state === 'hitstun' || p.invFrames > 0 || p.state === 'respawn') continue;
      if (p.ledgeRegrabTimer > 0) continue;
      
      for (const ledge of stage.ledges) {
        // Check if other player is on this ledge
        const otherOnLedge = players.some(op => op !== p && 
          (op.state === 'ledge' || op.state === 'ledgeHang' || op.state === 'ledgeClimb') && 
          op.ledgeSide === ledge.side);
        if (otherOnLedge) continue;
        
        const lx = ledge.x, ly = ledge.y;
        const towardStage = ledge.side === 'left' ? 1 : -1;
        
        // Must be approaching from the outside
        if (ledge.side === 'left' && p.x > lx + 25) continue;
        if (ledge.side === 'right' && p.x < lx - 25) continue;
        
        const dx = Math.abs(p.x - lx);
        const dy = p.y - ly; // positive = below ledge
        
        if (dx < LEDGE_GRAB_BOX.w) {
          if (dy <= 0 && dy > -LEDGE_GRAB_BOX.h) {
            // Player is at or above ledge level — edge stick (existing behavior)
            p.x = lx;
            p.y = ly;
            p.vx = 0; p.vy = 0;
            p.state = 'ledge';
            p.ledgeSide = ledge.side;
            p.hasDoubleJump = true;
            p.fastFalling = false;
            p.usedUpB = false;
            p.attackPhase = 'none';
            p.currentMove = null;
            p.currentMoveKey = null;
            Audio.ledgeGrab();
            break;
          } else if (dy > 0 && dy < p.char.hurtbox.h * 1.5) {
            // Player is below ledge level — ledge hang (new dangle mechanic)
            p.vx = 0; p.vy = 0;
            p.state = 'ledgeHang';
            p.ledgeSide = ledge.side;
            p.ledgeX = lx;
            p.ledgeY = ly;
            p.ledgeHangTimer = LEDGE_HANG_MAX;
            p.ledgeSettleTimer = 10;
            p.hasDoubleJump = true;
            p.fastFalling = false;
            p.usedUpB = false;
            p.attackPhase = 'none';
            p.currentMove = null;
            p.currentMoveKey = null;
            p.facing = towardStage;
            // VFX
            VFX.add('dustPuff', lx, ly - 5, { vx: towardStage * 2, vy: -2, size: 5, duration: 12 });
            VFX.add('dustPuff', lx, ly - 3, { vx: towardStage * 1, vy: -1.5, size: 4, duration: 10 });
            Audio.ledgeGrab();
            break;
          }
        }
      }
    }
  }
  
  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }
  
  function updateHUD() {
    for (let i = 0; i < 2; i++) {
      const p = players[i];
      const dmgEl = document.getElementById(`hudP${i+1}Dmg`);
      const stocksEl = document.getElementById(`hudP${i+1}Stocks`);
      const nameEl = document.getElementById(`hudP${i+1}`).querySelector('.hud-name');
      
      dmgEl.textContent = Math.floor(p.damage) + '%';
      // Color from ink to red based on damage
      const t = Math.min(p.damage / 150, 1);
      const r = Math.floor(59 + t * (139 - 59));
      const g = Math.floor(47 - t * 47);
      const b2 = Math.floor(30 - t * 30);
      dmgEl.style.color = `rgb(${r},${g},${b2})`;
      
      nameEl.textContent = 'P' + (i + 1) + ' — ' + p.char.name;
      
      stocksEl.innerHTML = '';
      for (let s = 0; s < STOCKS; s++) {
        const dot = document.createElement('div');
        dot.className = 'stock-dot' + (s >= p.stocks ? ' lost' : '');
        stocksEl.appendChild(dot);
      }
    }
  }
  
  function endMatch(winnerIdx) {
    winner = winnerIdx;
    matchActive = false;
    Audio.matchEnd();
    Music.play('results');
    
    document.getElementById('matchEndOverlay').classList.add('active');
    
    setTimeout(() => {
      document.getElementById('matchEndOverlay').classList.remove('active');
      document.getElementById('touchControls').style.display = 'none';
      document.getElementById('hud').classList.remove('visible');
      
      document.getElementById('winnerText').textContent = 'P' + (winner + 1) + ' (' + players[winner].char.name + ') Wins!';
      
      // Draw winner on canvas
      const wc = document.getElementById('winnerCanvas');
      const wctx = wc.getContext('2d');
      wctx.clearRect(0, 0, 200, 200);
      wctx.fillStyle = PARCHMENT;
      wctx.fillRect(0, 0, 200, 200);
      const winW = players[winner].char.id === 'blade' ? 240 : 180;
      const img = CharRenderer.drawChar(players[winner].char.id, 'idle', 0, 1, winW, 180);
      wctx.drawImage(img, (200 - winW) / 2, 10);
      
      // Reset buttons (may have been hidden by disconnect)
      document.getElementById('rematchBtn').style.display = '';
      document.getElementById('quitBtn').textContent = 'Quit';
      
      showScreen('resultsScreen');
    }, 2000);
  }
  
  function rematch() {
    Audio.menuConfirm();
    Music.play('menu');
    if (mode === 'multi') {
      Network.send({ type: 'rematch', accept: true });
    }
    gameState = 'charSelect';
    myCharConfirmed = false;
    remoteCharConfirmed = false;
    showScreen('charSelectScreen');
    document.getElementById('charSelectStatus').textContent = mode === 'multi' ? 'Both players must confirm' : '';
  }
  
  function onDisconnect() {
    matchActive = false;
    Music.play('menu');
    Network.disconnect();
    document.getElementById('touchControls').style.display = 'none';
    document.getElementById('hud').classList.remove('visible');
    document.getElementById('muteBtn').style.display = 'none';
    // Show results screen with disconnect message
    document.getElementById('winnerText').textContent = 'Opponent disconnected';
    const wc = document.getElementById('winnerCanvas');
    wc.getContext('2d').clearRect(0, 0, 200, 200);
    document.getElementById('rematchBtn').style.display = 'none';
    document.getElementById('quitBtn').textContent = 'Return to Menu';
    showScreen('resultsScreen');
    gameState = 'results';
  }
  
  function quit() {
    Audio.menuSelect();
    Music.play('menu');
    if (mode === 'multi') {
      Network.send({ type: 'opponent_quit' });
    }
    Network.disconnect();
    showScreen('titleScreen');
    gameState = 'title';
  }
  
  // ---- RENDERING ----
  // Reusable canvas for hit flash effect
  const flashCanvas = document.createElement('canvas');
  const flashCtx = flashCanvas.getContext('2d');
  
  function render() {
    const cw = canvas.width, ch = canvas.height;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, cw, ch);
    
    if (gameState !== 'match') return;
    
    // Paper background — use stage theme
    if (stage) {
      StageRenderer.drawBackground(ctx, stage, cw, ch);
    } else {
      ctx.fillStyle = PARCHMENT;
      ctx.fillRect(0, 0, cw, ch);
    }
    
    // Determine viewport area (above touch controls on mobile)
    const isMob = Input.isMobileDevice();
    const viewportH = isMob ? ch * 0.58 : ch;
    const viewportCX = cw / 2;
    const viewportCY = viewportH / 2;
    
    // Base scale: fit game world into viewport
    const baseScale = Math.min(cw / GAME_W, viewportH / GAME_H);
    
    ctx.save();
    ctx.translate(viewportCX, viewportCY);
    ctx.scale(baseScale, baseScale);
    
    // Screen shake offset
    const shake = VFX.getShake();
    ctx.translate(shake.x, shake.y);
    
    Camera.apply(ctx);
    
    // Draw stage
    if (stage) StageRenderer.draw(ctx, stage);
    
    // Draw projectiles
    Projectiles.draw(ctx);
    
    // Draw mines
    Mines.draw(ctx);
    
    // Draw players
    for (const p of players) {
      if (p.stocks <= 0 && p.respawnTimer <= 0) continue;
      
      try {
      ctx.save();
      
      // Invincibility flash
      if (p.invFrames > 0 && Math.floor(p.invFrames / 4) % 2 === 0) {
        ctx.globalAlpha = 0.4;
      }
      
      // Get animation state
      let animState = p.state;
      if (animState === 'grabHold') animState = 'grab';
      if (animState === 'respawn' || animState === 'shieldBreak') animState = 'hitstun';
      if (animState === 'helpless') animState = 'fall'; // render as wobbly fall
      if (animState === 'attackA' || animState === 'attackB') {
        // keep
      } else if (animState === 'ledgeHang' || animState === 'ledgeClimb') {
        // keep — new anim states
      } else if (!['idle', 'run', 'jump', 'fall', 'hitstun', 'shield', 'grab'].includes(animState)) {
        animState = 'idle';
      }
      
      const charWidthMult = p.char.id === 'blade' ? 6.5 : 4.5;
      const charW = p.char.hurtbox.w * charWidthMult;
      const charH = p.char.hurtbox.h * 2.6;
      const frame = Math.floor(p.animFrame) % 16;
      
      // Compute per-phase attack progress (0 to 1 within current phase)
      let attackProgress = 0;
      let attackPhaseName = 'none';
      if (p.attackPhase !== 'none' && p.currentMove) {
        const m = p.currentMove;
        attackPhaseName = p.attackPhase;
        if (p.attackPhase === 'startup') {
          attackProgress = p.attackFrame / Math.max(1, m.startup || 1);
        } else if (p.attackPhase === 'active') {
          attackProgress = p.attackFrame / Math.max(1, m.active || 1);
        } else if (p.attackPhase === 'recovery') {
          attackProgress = p.attackFrame / Math.max(1, m.recovery || 1);
        }
        attackProgress = Math.min(1, attackProgress);
      }
      
      const ss = VFX.getSquash(p.index);
      const charImg = CharRenderer.drawChar(p.char.id, animState, frame, p.facing, charW, charH, {
        squash: ss.sq, stretch: ss.st,
        attackProgress, attackPhase: attackPhaseName,
        moveKey: p.currentMoveKey || '',
        ledgeClimbProgress: p.state === 'ledgeClimb' ? p.ledgeClimbFrame / LEDGE_CLIMB_UP_FRAMES : 0,
        ledgeHangSway: p.state === 'ledgeHang' ? Math.sin((LEDGE_HANG_MAX - p.ledgeHangTimer) * 0.06) : 0,
        isHelpless: p.state === 'helpless',
        isHolding: p.state === 'grabHold'
      });
      
      const drawX = p.x - charW / 2;
      const drawY = p.y - charH + 8;
      
      // Pencil-draw respawn effect: character sketched in top-to-bottom
      if (p.respawnTimer > 0) {
        const respawnProg = 1 - (p.respawnTimer / 60); // 0 → 1 as timer counts down
        const revealH = charH * Math.min(1, respawnProg * 1.3); // slightly ahead of timer
        
        ctx.save();
        // Clip to only show revealed portion
        ctx.beginPath();
        ctx.rect(drawX - 5, drawY, charW + 10, revealH);
        ctx.clip();
        ctx.drawImage(charImg, drawX, drawY);
        ctx.restore();
        
        // Pencil tip at the drawing edge
        if (respawnProg < 0.85) {
          ctx.save();
          const pencilX = p.x + Math.sin(p.respawnTimer * 0.4) * 12; // slight wobble
          const pencilY = drawY + revealH;
          ctx.translate(pencilX, pencilY);
          ctx.rotate(0.3);
          // Pencil body (yellow)
          ctx.fillStyle = '#F0D050';
          ctx.strokeStyle = '#B8960A';
          ctx.lineWidth = 1.5;
          ctx.fillRect(-3, -22, 6, 18);
          ctx.strokeRect(-3, -22, 6, 18);
          // Metal ferrule
          ctx.fillStyle = '#C0C0B0';
          ctx.fillRect(-3, -4, 6, 4);
          // Tip
          ctx.fillStyle = INK;
          ctx.beginPath();
          ctx.moveTo(-2.5, 0);
          ctx.lineTo(0, 6);
          ctx.lineTo(2.5, 0);
          ctx.closePath();
          ctx.fill();
          // Pink eraser on top
          ctx.fillStyle = '#F0A0A8';
          ctx.fillRect(-2.5, -25, 5, 4);
          ctx.restore();
        }
      } else {
        ctx.drawImage(charImg, drawX, drawY);
      }
      
      // Smear frame: stretched ghost trail during active attack frames
      if (p.attackPhase === 'active' && p.currentMove) {
        ctx.save();
        ctx.globalAlpha = 0.25;
        ctx.translate(p.x - p.facing * 6, p.y - charH / 2 + 8);
        ctx.scale(1.08, 0.95);
        ctx.drawImage(charImg, -charW / 2, -charH / 2);
        ctx.restore();
        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.translate(p.x - p.facing * 12, p.y - charH / 2 + 8);
        ctx.scale(1.12, 0.92);
        ctx.drawImage(charImg, -charW / 2, -charH / 2);
        ctx.restore();
      }
      
      // Hit flash: white overlay when recently hit
      if (p.hitFlashFrames > 0) {
        ctx.save();
        if (flashCanvas.width !== charW || flashCanvas.height !== charH) {
          flashCanvas.width = charW;
          flashCanvas.height = charH;
        }
        flashCtx.clearRect(0, 0, charW, charH);
        flashCtx.drawImage(charImg, 0, 0);
        flashCtx.globalCompositeOperation = 'source-atop';
        flashCtx.fillStyle = '#ffffff';
        flashCtx.fillRect(0, 0, charW, charH);
        flashCtx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 0.6 + p.hitFlashFrames * 0.1;
        ctx.drawImage(flashCanvas, p.x - charW / 2, p.y - charH + 8);
        ctx.restore();
      }
      
      // Hitlag vibrate: jitter the character slightly during freeze
      if (p.hitlagFrames > 0) {
        ctx.save();
        const jx = (Math.random() - 0.5) * 4;
        const jy = (Math.random() - 0.5) * 4;
        ctx.globalAlpha = 0.4;
        ctx.drawImage(charImg, p.x - charW / 2 + jx, p.y - charH + 8 + jy);
        ctx.restore();
      }
      
      // P1 / P2 badge above head
      const badgeY = p.y - charH - 6;
      const badgeR = 13;
      const label = p.index + 1;
      // Circle badge
      ctx.strokeStyle = INK;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(p.x, badgeY, badgeR, 0, Math.PI * 2);
      ctx.fillStyle = p.index === 0 ? PARCHMENT : INK;
      ctx.fill();
      ctx.stroke();
      // Number — bold and thick
      ctx.font = '900 18px Patrick Hand SC, cursive';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = p.index === 0 ? INK : PARCHMENT;
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = p.index === 0 ? INK : PARCHMENT;
      ctx.strokeText(label, p.x, badgeY);
      ctx.fillText(label, p.x, badgeY);
      ctx.textBaseline = 'alphabetic';
      
      // Shield bubble
      if (p.shieldActive) {
        const shieldScale = p.shieldHP / SHIELD_MAX;
        ctx.fillStyle = `rgba(100,180,220,${0.3 * shieldScale})`;
        ctx.strokeStyle = `rgba(50,120,180,${0.5 * shieldScale})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(p.x, p.y - p.char.hurtbox.h / 2, 30 * shieldScale, 35 * shieldScale, 0, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
      }
      
      ctx.restore();
      } catch(e) { ctx.restore(); } // safety net: never let render errors cascade
    }
    
    // Draw grab hold indicator
    for (const p of players) {
      if (p.state === 'grabHold' && p.grabTarget) {
        const t = p.grabTarget;
        const midX = (p.x + t.x) / 2;
        const midY = (p.y + t.y) / 2 - 25;
        
        // Struggle lines radiating from hold point
        ctx.strokeStyle = INK;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.5 + Math.sin(matchFrame * 0.4) * 0.2;
        for (let i = 0; i < 6; i++) {
          const angle = (i / 6) * Math.PI * 2 + matchFrame * 0.15;
          const inner = 5;
          const outer = 10 + Math.sin(matchFrame * 0.6 + i) * 4;
          ctx.beginPath();
          ctx.moveTo(midX + Math.cos(angle) * inner, midY + Math.sin(angle) * inner);
          ctx.lineTo(midX + Math.cos(angle) * outer, midY + Math.sin(angle) * outer);
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }
    }
    
    // Draw VFX
    VFX.draw(ctx);
    
    // Debug hitboxes (uncomment to see)
    /*
    for (const p of players) {
      if (p.attackPhase === 'active') {
        const hb = p.getActiveHitbox();
        if (hb) {
          ctx.strokeStyle = 'red';
          ctx.lineWidth = 1;
          ctx.strokeRect(hb.x, hb.y, hb.w, hb.h);
        }
      }
      const hr = p.hurtbox;
      ctx.strokeStyle = 'green';
      ctx.lineWidth = 1;
      ctx.strokeRect(hr.x, hr.y, hr.w, hr.h);
    }
    */
    
    ctx.restore();
  }
  
  // ---- NETWORK MESSAGES ----
  function handleNetMessage(data) {
    if (data.type === 'char_select') {
      remoteCharConfirmed = true;
      remoteCharId = data.character_id;
      document.getElementById('charSelectStatus').textContent = 'Opponent confirmed!';
      if (myCharConfirmed) {
        setTimeout(() => {
          gameState = 'stageSelect';
          showScreen('stageSelectScreen');
          document.getElementById('stageGrid').style.display = '';
          document.getElementById('stageConfirmBtn').style.display = '';
          document.getElementById('stageSelectScreen').querySelector('.game-title').textContent = 'Choose a Stage';
          if (!Network.getIsHost()) {
            document.getElementById('stageConfirmBtn').style.display = 'none';
            document.getElementById('stageGrid').style.display = 'none';
            document.getElementById('stageSelectScreen').querySelector('.game-title').textContent = 'Host is choosing stage...';
          }
        }, 500);
      }
    } else if (data.type === 'stage_select') {
      selectedStage = data.stage_id;
      startMatch();
    } else if (data.type === 'sync_check') {
      // Buffer — will be compared at the correct frame inside lockstep loop
      pendingSyncChecks[data.frame] = { hash: data.hash, state: data.state || null };
    } else if (data.type === 'state_sync') {
      if (!Network.getIsHost()) {
        deserializeGameState(data.state);
      }
    } else if (data.type === 'rematch') {
      // Remote requested rematch — go to char select WITHOUT re-sending
      Audio.menuConfirm();
      Music.play('menu');
      gameState = 'charSelect';
      myCharConfirmed = false;
      remoteCharConfirmed = false;
      showScreen('charSelectScreen');
      document.getElementById('charSelectStatus').textContent = 'Both players must confirm';
    } else if (data.type === 'opponent_quit') {
      onDisconnect();
    }
  }
  
  return {
    init, startSinglePlayer, showMultiplayer, onNetworkConnected,
    confirmCharacter, confirmStage, rematch, quit, showScreen
  };
})();

// Start
window.addEventListener('DOMContentLoaded', Game.init);
window.addEventListener('load', Game.init);
</script>
